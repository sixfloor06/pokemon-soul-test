      function parseDateValue(value) {
        const parts = String(value || "").split("-").map(Number);
        if (parts.length !== 3 || parts.some((part) => !Number.isInteger(part))) return null;
        return { year: parts[0], month: parts[1], day: parts[2] };
      }

      function friendlyError(error) {
        const message = String(error?.message || error || "");
        if (/future|未来|later than/i.test(message)) return "出生时间不能晚于现在，请重新检查。";
        if (/date|日期|day|month|year/i.test(message)) return "日期似乎不完整，请重新选择出生日期。";
        if (/timezone|时区|offset/i.test(message)) return "请选择有效的出生时区。";
        if (/pokedex|fetch|load|network|Failed to fetch/i.test(message)) return "宝可梦资料暂时没有载入，请稍后再试。";
        return "这次测试没有完成，请检查输入后再试一次。";
      }

      let pendingResult = null;
      let runToken = 0;

      async function runMachine(result, token) {
        const guard = () => token === runToken;
        const mainStrip = document.getElementById("reel-main");
        const subStrip = document.getElementById("reel-sub");
        const combo = Array.isArray(result.typeCombo) && result.typeCombo.length ? result.typeCombo : (result.selectedSpecies?.types || ["Normal"]);
        const mainType = combo[0];
        const subType = combo[1] || combo[0];

        const script = ["整理观察样本…", "建立能量结构…", "观察属性倾向…", ...signalLines(result)];
        for (const line of script) {
          if (!guard()) return;
          setLcd("分析中", line, true);
          await sleep(820);
        }
        if (!guard()) return;
        setLcd("分析中", `主信号锁定：${TYPE_CN[mainType] || mainType}`, true);
        await stopReelAt(mainStrip, mainType);
        if (!guard()) return;
        await sleep(280);
        setLcd("分析中", "副信号扫描中…", true);
        await sleep(700);
        if (!guard()) return;
        setLcd("分析中", `副信号锁定：${TYPE_CN[subType] || subType}`, true);
        await stopReelAt(subStrip, subType);
        if (!guard()) return;
        machineEl.classList.add("locked");
        setLcd("分析结束", "共鸣伙伴匹配完成", false);
        seeReportBtn.classList.remove("is-hidden");
      }

      async function submitForm(event) {
        event.preventDefault();
        formError.textContent = "";
        const date = parseDateValue(document.getElementById("birth-date").value);
        if (!date) {
          formError.textContent = "日期似乎不完整，请重新选择出生日期。";
          return;
        }
        const token = ++runToken;
        pendingResult = null;
        machineEl.classList.remove("locked");
        seeReportBtn.classList.add("is-hidden");
        showScreen("machine");
        syncReelMetrics();
        startSpin(document.getElementById("reel-main"));
        startSpin(document.getElementById("reel-sub"));
        setLcd("分析中", "整理观察样本…", true);
        try {
          const result = await window.PokemonSoulAlgorithm.calculatePokemonSoul({
            ...date,
            hour: Number(document.getElementById("birth-hour").value || 12),
            timezoneOffsetMinutes: Number(document.getElementById("birth-timezone").value || 480)
          });
          if (token !== runToken) return;
          pendingResult = result;
          await runMachine(result, token);
        } catch (error) {
          if (token !== runToken) return;
          formError.textContent = friendlyError(error);
          showScreen("input");
        }
      }

      function openReport() {
        if (!pendingResult) return;
        try {
          renderResult(pendingResult);
          showScreen("result");
        } catch (error) {
          resultError.textContent = friendlyError(error);
          resultError.classList.add("is-visible");
          resultContent.style.display = "none";
          showScreen("result");
        }
      }

      /* ---------- self tests ---------- */
      function assert(condition, message) { if (!condition) throw new Error(message); }
      async function runFrontendSelfTests() {
        const tests = [];
        async function test(name, fn) {
          try { await fn(); tests.push({ name, pass: true }); }
          catch (error) { tests.push({ name, pass: false, error: String(error?.message || error) }); }
        }
        await test("four required screens exist", () => {
          assert(Object.values(screens).every(Boolean), "required screen is missing");
        });
        await test("reels contain all 18 types x copies", () => {
          const strip = document.getElementById("reel-main");
          assert(strip.children.length === REEL_ORDER.length * REPEAT, "reel cell count mismatch");
          const types = new Set([...strip.children].map((cell) => cell.dataset.type));
          assert(types.size === 18, "reel must contain 18 distinct types");
        });
        await test("every reel type has an icon", () => {
          assert(REEL_ORDER.every((type) => typeof TYPE_ICONS[type] === "string" && TYPE_ICONS[type].startsWith("data:image")), "missing type icon");
        });
        await test("height/weight lookup works", () => {
          const hit = lookupHeightWeight("Greavard");
          assert(Array.isArray(hit) && hit.length === 2, "Greavard not found in HW map");
        });
        await test("signal lines stay in type language", () => {
          const lines = signalLines({ debug: { mainTypeScores: { Fire: 2, Water: 1, Grass: 0.5 } } });
          assert(lines.length === 3, "expected 3 signal lines");
          assert(lines.every((line) => /系能量 \d+(\.\d)?%$/.test(line)), "line format mismatch");
          const banned = ["八字", "五行", "十神", "用神", "身强", "身弱", "命格"];
          assert(lines.every((line) => banned.every((term) => !line.includes(term))), "restricted term leaked");
        });
        const failed = tests.filter((t) => !t.pass);
        return { passed: tests.length - failed.length, failed: failed.length, tests };
      }

      /* ---------- wiring ---------- */
      buildReel(document.getElementById("reel-main"));
      buildReel(document.getElementById("reel-sub"));
      window.addEventListener("resize", () => {
        if (screens.machine.classList.contains("is-active")) syncReelMetrics();
      });
      document.getElementById("go-input").addEventListener("click", () => showScreen("input"));
      form.addEventListener("submit", submitForm);
      seeReportBtn.addEventListener("click", openReport);
      document.getElementById("restart-resonance").addEventListener("click", () => {
        machineEl.classList.remove("locked");
        seeReportBtn.classList.add("is-hidden");
        showScreen("input");
      });

      window.PokemonSoulFrontend = { showScreen, runFrontendSelfTests, lookupHeightWeight, signalLines, safeExplanation, buildConciseObservation };
      showScreen("home");
    })();
  </script>

</body>
