<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>宝可梦共鸣测试</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
  <style>
        :root {
      --red: #e8443a;
      --red-deep: #b8221f;
      --red-line: #8c1a14;
      --pink: #f6a8b4;
      --pink-line: #d8485f;
      --ink: #2a1a1a;
      --paper: #fffdfa;
      --lcd: #0c130c;
      --lcd-green: #41f06a;
      --shadow: rgba(64, 40, 40, .32);
      --cell: 52px;
      --frame: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABQAAAAUCAYAAACNiR0NAAAApElEQVR42mNkwAJ6pET+MxABSp69YUQXY8FmSPHT1wxEAWnR/+iGMyIbBjPo+8qtRJnHGe7NwMDAwNArLQo3lAXZVcQaBAMw9cVPX8MNZcFnM7EGYkTA/////39bseX/txVb/v///////7+/iMNo+nqkRP4zMVAZjBo4auBgMBB3biECoOcSnHmZ1EICa3nYKy1KcfEFLw/JLWCRDUIpYKlZBQAAPj6/WtbnJPQAAAAASUVORK5CYII=");
      --frame-black: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABIAAAASCAYAAABWzo5XAAAAXklEQVR42mNkQAIaUlL/GUgAN549Y4SxGckxAJuBTAxUAozIrrn+9ClJmjWlpeFsFnTJN2/eEGWIiIgICp+FGEXEWEa1MBo1aCgaxEJsOiHZIEKJEWdeG3y5n1oFGwCJLx2Dits32gAAAABJRU5ErkJggg==");
      --btn: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAAxElEQVR42mNkwAF6pET+M5AASp69YcQmzoLL0OKaPAaSQMuk/9gsY0Q2HNnQl+t2kGS+eJAHnN3bMgluCSO64aQajMsimCVMyJKUGo7NDCYGGgNGWPBQw/XoQdXbMon2Phi1YNSCUQugOVmZjYPBUkWOqgYfv/OI4e6vH3QIopJnbxjv/vqBUp5Toxy6++sHanG9oWsW1SxANosFPdxggNQ4QdaLEsnIVaYyGwdVfAALHhQL0Ct9Ui27++sHA95Kn1bNFgBO/1pqn84O7gAAAABJRU5ErkJggg==");
    }
    @font-face {
      font-family: "FZXIANGSU16";
      src: url("FZXIANGSU16.ttf") format("truetype");
      font-display: swap;
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      min-width: 320px;
      min-height: 100svh;
      color: var(--ink);
      font: 16px/1.6 "FZXIANGSU16", "Zpix", "Press Start 2P", ui-monospace, "Microsoft YaHei", system-ui, sans-serif;
      background: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAAYUlEQVR42u3WoQ7AIAxF0Uflwv9/4jIxtTRYprZgaUXNrcJccgyh7brPKUn96NodH/6fo71F47XL9M3HM1U4puIBAAAAAAD1gPVLjUy2t8wlX5fp2Qd4BQAAAAAAoHwfeAEe9CmtIOORvgAAAABJRU5ErkJggg==");
      background-size: 64px 64px;
      image-rendering: pixelated;
      -webkit-font-smoothing: none;
      font-smooth: never;
    }
    img { image-rendering: pixelated; }
    button { font: inherit; cursor: pointer; image-rendering: pixelated; }
    input, select { font: inherit; }

    .app-shell {
      width: min(100%, 480px);
      min-height: 100svh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    /* ===== INFO header bar ===== */
    .info-bar {
      position: sticky; top: 0; z-index: 30;
      display: flex; align-items: center; gap: 12px;
      margin: 10px 0 0; padding: 9px 16px;
      color: #fff; background: var(--red);
      border-top: 3px solid var(--red-line);
      border-bottom: 3px solid var(--red-line);
      box-shadow: 0 4px 0 var(--shadow), inset 0 4px 0 rgba(255,255,255,.28), inset 0 -4px 0 rgba(0,0,0,.16);
      font-size: 22px; font-weight: 800; letter-spacing: 4px;
      text-shadow: 2px 2px 0 var(--red-line);
      user-select: none;
    }
    .info-bar .tri { width: 16px; height: auto; }

    /* ===== screens ===== */
    .screen { display: none; flex: 1; padding: 26px 18px 34px; }
    .screen.is-active { display: flex; flex-direction: column; }

    /* ===== pixel 9-slice frame ===== */
    .pix-box {
      position: relative;
      border: 10px solid transparent;
      border-image: var(--frame) 5 fill stretch;
      filter: drop-shadow(4px 5px 0 var(--shadow));
      padding: 18px 16px 18px;
      image-rendering: pixelated;
    }
    /* tab boxes need extra headroom so the label tab never overlaps the first line */
    .pix-box.has-tab { margin-top: 22px; padding-top: 26px; }
    .pix-tab {
      position: absolute; top: -20px; left: 6px; z-index: 2;
      padding: 3px 14px; color: #fff; background: var(--red);
      border: 3px solid var(--red-line);
      box-shadow: 2px 3px 0 var(--shadow), inset 0 2px 0 rgba(255,255,255,.3);
      font-size: 14px; letter-spacing: 2px; white-space: nowrap;
      image-rendering: pixelated;
    }

    /* ===== pixel button (9-slice) ===== */
    .pix-button {
      display: block;
      width: min(100%, 300px);
      margin: 0 auto;
      border: 14px solid transparent;
      border-image: var(--btn) 7 fill stretch;
      padding: 2px 10px 4px;
      min-height: 56px;
      color: #fff;
      background: transparent;
      filter: drop-shadow(3px 4px 0 var(--shadow));
      font-size: 20px; font-weight: 800; letter-spacing: 6px;
      text-shadow: 2px 2px 0 var(--red-line);
      image-rendering: pixelated;
    }
    .pix-button:active { transform: translate(2px, 3px); filter: drop-shadow(1px 2px 0 var(--shadow)); }
    .pix-button[disabled] { opacity: .45; cursor: default; }
    .pix-button.is-hidden { visibility: hidden; }

    /* ===== home ===== */
    .home-screen { align-items: center; justify-content: space-between; text-align: center; }
    .home-crest { position: relative; margin: 6vh 0 0; height: 64px; width: 200px; }
    .home-crest .ball { position: absolute; left: 50%; top: 0; width: 56px; transform: translateX(-50%); }
    .home-crest .s1 { position: absolute; left: 14px; top: 8px; width: 26px; animation: twinkle 1.6s steps(3) infinite; }
    .home-crest .s2 { position: absolute; right: 18px; top: 22px; width: 18px; animation: twinkle 1.9s steps(3) infinite .4s; }
    @keyframes twinkle { 0%,100% { opacity: 1; } 50% { opacity: .25; } }
    .home-title {
      margin: 18px 0 0;
      font-size: clamp(32px, 8.5vw, 42px); line-height: 1.4; letter-spacing: 6px;
      color: var(--ink);
      text-shadow: 3px 0 #fff, -3px 0 #fff, 0 3px #fff, 0 -3px #fff,
        3px 3px 0 #fff, -3px 3px 0 #fff, 3px -3px 0 #fff, -3px -3px 0 #fff,
        5px 6px 0 rgba(64,40,40,.22);
    }
    .home-welcome { width: min(100%, 340px); margin: 0 auto; text-align: left; font-size: 15px; line-height: 1.8; position: relative; min-height: 92px; }
    .home-welcome .flask { position: absolute; right: -4px; top: -30px; width: 44px; }
    .home-bottom { width: 100%; padding-bottom: 5vh; }

    /* ===== input (professor) ===== */
    .prof-row { display: flex; align-items: flex-end; gap: 12px; margin: 4px 0 28px; }
    .prof-avatar {
      width: 84px; height: 84px; flex: 0 0 auto;
      border: 8px solid transparent;
      border-image: var(--frame-black) 5 fill stretch;
      background: #2f7fd0;
      image-rendering: pixelated;
      display: grid; place-items: center;
    }
    .prof-avatar img { width: 70px; height: 70px; }
    .prof-row .spark { width: 22px; margin-bottom: 40px; animation: twinkle 1.7s steps(3) infinite .2s; }
    .speech { width: 100%; min-height: 84px; }
    .speech p { margin: 0; font-size: 15px; line-height: 1.8; }

    .pix-form { display: grid; gap: 22px; margin-top: 30px; }
    .pix-field { position: relative; }
    .pix-field label {
      position: absolute; top: -12px; left: 12px; z-index: 2;
      padding: 1px 10px; color: #fff; background: var(--red);
      border: 2px solid var(--red-line); box-shadow: 1px 2px 0 var(--shadow);
      font-size: 13px; letter-spacing: 2px;
    }
    .pix-field input, .pix-field select {
      width: 100%; min-height: 54px; padding: 14px 12px 10px;
      color: var(--ink); background: var(--paper);
      border: 8px solid transparent; border-image: var(--frame) 5 fill stretch;
      outline: none; appearance: none; border-radius: 0;
      text-align: center; letter-spacing: 1px; image-rendering: pixelated;
    }
    .pix-field select { background-image: none; }
    .form-error { min-height: 1.4em; margin: 2px 0 0; color: #a31f1f; font-size: 14px; text-align: center; }

    /* ===== machine: pixel lab-analysis device + slot cabinet ===== */
    .machine-screen { align-items: center; }
    .machine {
      position: relative;
      width: min(90vw, 360px);
      margin: 8px auto 26px;
      padding: 0 0 4px;
      background:
        linear-gradient(90deg, rgba(0,0,0,.16), rgba(255,255,255,.10) 12%, rgba(255,255,255,0) 30%,
          rgba(255,255,255,0) 70%, rgba(0,0,0,.10) 88%, rgba(0,0,0,.22)),
        linear-gradient(#ef5a50, var(--red) 34%, #cf372e 80%, #a8281f);
      border: 6px solid var(--red-line);
      box-shadow:
        inset 0 7px 0 rgba(255,255,255,.32),
        inset 0 -8px 0 rgba(0,0,0,.26),
        7px 9px 0 var(--shadow);
      image-rendering: pixelated;
    }
    /* corner rivets */
    .machine .rivet {
      position: absolute; width: 12px; height: 12px; z-index: 3;
      background: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAcAAAAHCAYAAADEUlfTAAAAXklEQVR42l2NIQqAQBQF5y+eQ0TE4JlMhk2eQxaz2eSZDEYPYDDZ1uJfPztp4DE84WM/zqjetaUAOIDrftIA0A9jBBBbAExhTl4AeO/JqermL22hiP2wbOsiTiUfAF7C9h2ln6PexgAAAABJRU5ErkJggg==") center / contain no-repeat; image-rendering: pixelated;
    }
    .machine .rivet.tl { left: 4px; top: 4px; }
    .machine .rivet.tr { right: 4px; top: 4px; }
    .machine .rivet.bl { left: 4px; bottom: 4px; }
    .machine .rivet.br { right: 4px; bottom: 4px; }

    /* side pull lever */
    .machine .lever {
      position: absolute; right: -15px; top: 78px; width: 17px; height: 90px; z-index: 4;
      background: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAA4AAABKCAYAAACLgWWrAAAA10lEQVR42mNgwAM2KMj8xyXHgk+xhYocwwYGBjg/4METRhibEV2ThYocAwMDA4N4kAfDy3U7UAw9cecRXDMTsZrgLoC6iAmb+7FpQgdMDGQCRnRnEgNO3HkEsTHgwRPGE3ceEa0p4METRrKdSrlGYpyLHI+MhFIOsmHIKYeB3LSK1Y85RTX/33368Z9h2hKGnKKa/7QJnFGNoxpHNY5qHNU4qnFU46jGUY2jGmnc74ABGweP/4Q0HDmwgxFrb05BSQWnpgf37oxGBwxUVZSRp7Gto2tEp1UARLJQw5D0xeEAAAAASUVORK5CYII=") center / contain no-repeat; image-rendering: pixelated;
      transform-origin: 50% 88%;
      filter: drop-shadow(2px 2px 0 var(--shadow));
    }
    .machine:not(.locked) .lever { animation: leverbob .5s ease-in-out infinite alternate; }
    @keyframes leverbob { from { transform: rotate(-5deg); } to { transform: rotate(7deg); } }
    .machine.locked .lever { transform: rotate(0deg); transition: transform .4s ease-out; }

    /* teal lab marquee with diode rows + label readout */
    .machine-crown {
      position: relative; display: flex; align-items: center; justify-content: center; gap: 8px;
      height: 36px; margin: 6px 6px 0; padding: 0 10px;
      background: linear-gradient(#63d6cd, #2fb3aa 48%, #18837c);
      border: 3px solid #0f5d57;
      box-shadow: inset 0 3px 0 rgba(255,255,255,.5), inset 0 -3px 0 rgba(0,0,0,.28);
    }
    .leds { display: flex; gap: 5px; }
    .leds i { width: 9px; height: 9px; image-rendering: pixelated; background: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAUAAAAFCAYAAACNbyblAAAAPElEQVR42mNkYGBgEKkw+c8ABW86zjCyiFSY/H/dfprB6WM2AwMDA8NlBob/TAwMDHABGGBiwAIYsZkJABd0ERXGV7bQAAAAAElFTkSuQmCC") center / contain no-repeat; animation: dblink .9s steps(2) infinite; }
    .leds i:nth-child(2) { background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAUAAAAFCAYAAACNbyblAAAAPElEQVR42mNkYGBg2JLH9Z8BCnwmfWNk2ZLH9d974lcGhqO2DAwMDAxbGM79Z2JgYIALwAATAxbAiM1MAP9qEIxDRTlpAAAAAElFTkSuQmCC"); animation-delay: .3s; }
    .leds i:nth-child(3) { background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAUAAAAFCAYAAACNbyblAAAAPElEQVR42mNkYGBg2KAg858BCgIePGFk2aAg89///mOGl67WDAwMDAwbGBj+MzEwMMAFYICJAQtgxGYmAPmbEIjdVOTwAAAAAElFTkSuQmCC"); animation-delay: .6s; }
    @keyframes dblink { 50% { opacity: .25; } }
    .marquee {
      padding: 2px 8px 1px; color: var(--lcd-green); background: #06120b;
      border: 2px solid #0c3a22; font-size: 11px; letter-spacing: 3px;
      font-family: "FZXIANGSU16", "Press Start 2P", ui-monospace, monospace;
      text-shadow: 0 0 5px rgba(65,240,106,.6);
    }

    /* gauges */
    .gauge-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 20px 2px; }
    .gauge { position: relative; width: 40px; height: 40px; background: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABQAAAAUCAYAAACNiR0NAAAA+UlEQVR42mNgoDJgxCVx7daj//g0aqnJMRJlICGDCBnMiMuwA4eO4DXIwc4Gq6GM+AyrqChh+Pj6KQO/qDQDAwMDnN3R0QM3tK2ji4GBgYFhybwpjAwMDAws6DYfOHSEITM5Em4IjEZmwyyaPnc5hsuZkF0HcxmyIbgATI2VlRUDAwMDQ0xSzn+4gcggMzmS6AjBppYJl83EAGxqmYjReOLYCaItIcpAWExSzcBNm9ZR10BSAIaBsERLDMCmlgk56yBnJ2LBsWPH8OcUBzsbuM0VFSV4XQYzDG/hAItRWA4g5DJk12EtvmBZiFiAbBjeApaQwegG0QwAAHQXYHDe2I6vAAAAAElFTkSuQmCC") center / contain no-repeat; image-rendering: pixelated; filter: drop-shadow(1px 2px 0 rgba(0,0,0,.3)); }
    .gauge .needle { position: absolute; left: calc(50% - 1px); bottom: 50%; width: 2px; height: 13px; background: var(--lcd-green); transform-origin: 50% 100%; box-shadow: 0 0 3px rgba(65,240,106,.7); }
    .machine:not(.locked) .gauge .needle { animation: gsweep 1.4s ease-in-out infinite alternate; }
    .machine:not(.locked) .gauge.g2 .needle { animation-duration: 1.05s; }
    @keyframes gsweep { from { transform: rotate(-58deg); } to { transform: rotate(58deg); } }
    .machine.locked .gauge.g1 .needle { transform: rotate(46deg); transition: transform .5s cubic-bezier(.2,.8,.2,1.2); }
    .machine.locked .gauge.g2 .needle { transform: rotate(28deg); transition: transform .5s cubic-bezier(.2,.8,.2,1.2); }
    .gauge-label { font-size: 10px; letter-spacing: 2px; color: #ffe; opacity: .85; }

    /* recessed reel bay */
    .machine-reels {
      display: flex; align-items: stretch; gap: 0;
      margin: 6px 12px; padding: 12px 12px;
      background: linear-gradient(#4a1411, #5a1714);
      border: 4px solid #7a1d18;
      box-shadow: inset 0 5px 9px rgba(0,0,0,.55), inset 0 -3px 0 rgba(255,255,255,.06);
    }
    .reel-window {
      position: relative; flex: 1 1 0;
      height: 44vw; max-height: 200px; min-height: 148px;
      overflow: hidden; background: #fff;
      border: 12px solid transparent; border-image: var(--frame-black) 5 fill stretch;
      image-rendering: pixelated;
    }
    .reel-window::after {  /* glass reflection */
      content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 2;
      background: linear-gradient(125deg, rgba(255,255,255,.55), rgba(255,255,255,.08) 34%, rgba(255,255,255,0) 52%);
    }
    .reel-divider {
      flex: 0 0 18px; position: relative; align-self: stretch;
      background: linear-gradient(90deg, #6b7079, #c7ccd4 45%, #e8ebf0 52%, #9aa0a8 70%, #5c6068);
      border-left: 2px solid #4a4e56; border-right: 2px solid #4a4e56;
    }
    .reel-divider .bolt {
      position: absolute; left: 50%; transform: translateX(-50%); width: 11px; height: 11px;
      background: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAcAAAAHCAYAAADEUlfTAAAAXklEQVR42l2NIQqAQBQF5y+eQ0TE4JlMhk2eQxaz2eSZDEYPYDDZ1uJfPztp4DE84WM/zqjetaUAOIDrftIA0A9jBBBbAExhTl4AeO/JqermL22hiP2wbOsiTiUfAF7C9h2ln6PexgAAAABJRU5ErkJggg==") center / contain no-repeat; image-rendering: pixelated;
    }
    .reel-divider .bolt.t { top: 4px; }
    .reel-divider .bolt.b { bottom: 4px; }
    .reel-strip { display: flex; flex-direction: column; align-items: center; will-change: transform; }
    .reel-strip .cell { flex: 0 0 var(--cell); height: var(--cell); width: 100%; display: grid; place-items: center; }
    .reel-strip img { width: 92%; max-width: 130px; transition: opacity .5s steps(4); }
    @keyframes reelspin { from { transform: translateY(0); } to { transform: translateY(var(--loop)); } }
    .reel-strip.spinning { animation: reelspin .5s linear infinite; }
    .machine.locked .reel-strip img { opacity: .22; }
    .machine.locked .reel-strip .cell.hit img { opacity: 1; }

    /* metal control deck: knobs + scope + LCD */
    .machine-deck {
      display: grid; grid-template-columns: auto 1fr auto; gap: 10px; align-items: center;
      margin: 6px 12px 0; padding: 10px 10px 12px;
      background: linear-gradient(#d2d6dd, #aeb4bd 55%, #8b919b);
      border-top: 4px solid #eef0f4; border-bottom: 5px solid #595d65;
      box-shadow: inset 2px 0 0 rgba(255,255,255,.4), inset -2px 0 0 rgba(0,0,0,.2);
    }
    .machine-deck .knob {
      width: 26px; height: 26px; image-rendering: pixelated;
      background: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAwAAAAMCAYAAABWdVznAAAAjUlEQVR42mNgIBEwInNsHDz+MzAwMLy6dYlBTE0PLn7kwA5GDJ02Dh7/r9169P/arUf/1aSk4Oxrtx79hxnEwMDAwARTPGvWLKxOaOvoYlBQUoHbzoRN0YYDJ+CK0QETLs9hU4xTAy7FWDXgU4yhgZBilHiwcfD4r6CkglXRg3t34HGBNeLQAdaIIxYAAD15OkaH5OIzAAAAAElFTkSuQmCC") center / contain no-repeat;
      filter: drop-shadow(1px 2px 0 rgba(0,0,0,.35));
    }
    .machine:not(.locked) .machine-deck .knob { animation: knobturn 2.2s linear infinite; }
    @keyframes knobturn { to { transform: rotate(300deg); } }
    .deck-screens { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
    .scope {
      height: 22px; background: #061009 url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAAAWCAYAAABwvpo0AAAA70lEQVR42u2YPQ6DMAyFX6UcgSN07Ya6s/QwnCBH4GxVN67RgRukk1UrIg0/cRxKPEUKzmeewdgA1U5uzeNqz7wfF8i2TjVBwnwTA9/sHSPgAOA9vC65b1yab36BAWAcnt91BiFy840P52CCEZgHIiGCCp8XiW7qXWNbx987vk973dQ7iSKlwYd/eOpr12Rfje+rusQoW4fnE3ztYVv9SuPvUnJvECX4RxuNaJGJBBHyXxq8NL/WkL+o4gXwg9/xOXCyRy8B36QMINS2zrW3EraJn3rc5CpTRvjaz442P8tQw/t6lWlSgX+a/wnVjm4fsjZgzyJZsI8AAAAASUVORK5CYII=") repeat-x left center;
      background-size: 64px 22px; image-rendering: pixelated;
      border: 3px solid #0c3a22;
      box-shadow: inset 0 0 8px rgba(65,240,106,.25);
      animation: scopescroll 1.1s linear infinite;
    }
    @keyframes scopescroll { to { background-position: -64px center; } }
    .machine.locked .scope { animation-play-state: paused; }
    .lcd {
      position: relative; min-height: 50px; padding: 7px 8px 8px;
      display: flex; flex-direction: column; justify-content: center; gap: 3px;
      color: var(--lcd-green); text-align: center; background: var(--lcd);
      border: 4px solid transparent; border-image: var(--frame-black) 5 fill stretch;
      box-shadow: inset 0 0 12px rgba(65,240,106,.18);
      font-family: "FZXIANGSU16", "Zpix", "Press Start 2P", ui-monospace, monospace;
      text-shadow: 0 0 6px rgba(65,240,106,.55); overflow: hidden;
    }
    .lcd::after {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAADCAYAAABS3WWCAAAAEUlEQVR42mNggAI3BgYGBgYAAbMAR5tnoFQAAAAASUVORK5CYII="); background-size: 100% 3px; image-rendering: pixelated; opacity: .9;
    }
    .lcd .l1 { font-size: clamp(14px, 4.4vw, 19px); letter-spacing: 4px; }
    .lcd .l2 { font-size: clamp(11px, 3.6vw, 15px); white-space: nowrap; opacity: .94; }
    .lcd .l1.blink { animation: lcdblink 1s steps(2) infinite; }
    @keyframes lcdblink { 50% { opacity: .35; } }

      const CLASH_PAIRS = new Set(["子午", "午子", "丑未", "未丑", "寅申", "申寅", "卯酉", "酉卯", "辰戌", "戌辰", "巳亥", "亥巳"]);
      const FORBIDDEN_VISIBLE_TERMS = ["八字", "五行", "十神", "用神", "身强", "身弱", "命格"];

      let pokedexCache = null;
      let pokedexPromise = null;

      function friendlyError(message) {
        const error = new Error(message);
        error.name = "PokemonSoulAlgorithmError";
        return error;
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function round(value, digits = 6) {
        const factor = 10 ** digits;
        return Math.round(value * factor) / factor;
      }

      function fnv1a(text) {
        let hash = 0x811c9dc5;
        for (let index = 0; index < text.length; index += 1) {
          hash ^= text.charCodeAt(index);
          hash = Math.imul(hash, 0x01000193);
        }
        return hash >>> 0;
      }

      function stableFraction(seed, purpose) {
        return fnv1a(`${seed}|${purpose}`) / 0xffffffff;
      }

      function stableSort(items, scoreFn, seed, purpose, descending = true) {
        return [...items].sort((left, right) => {
          const delta = scoreFn(left) - scoreFn(right);
          if (Math.abs(delta) > 1e-12) return descending ? -delta : delta;
          return fnv1a(`${seed}|${purpose}|${String(left)}`) - fnv1a(`${seed}|${purpose}|${String(right)}`);
        });
      }

      function emptyElements() {
        return Object.fromEntries(ELEMENTS.map((element) => [element, 0]));
      }

      function normalizeMap(values) {
        const total = Object.values(values).reduce((sum, value) => sum + value, 0);
        return Object.fromEntries(Object.entries(values).map(([key, value]) => [key, total ? round(value / total) : 0]));
      }

      function nextElement(element) {
        return ELEMENTS[(ELEMENTS.indexOf(element) + 1) % ELEMENTS.length];
      }

      function previousElement(element) {
        return ELEMENTS[(ELEMENTS.indexOf(element) + ELEMENTS.length - 1) % ELEMENTS.length];
      }

      function controlledBy(element) {
        return { Wood: "Metal", Fire: "Water", Earth: "Wood", Metal: "Fire", Water: "Earth" }[element];
      }

      function controls(element) {
        return { Wood: "Earth", Fire: "Metal", Earth: "Water", Metal: "Wood", Water: "Fire" }[element];
      }

      function relationToTenGod(dmWx, otherWx) {
        if (otherWx === dmWx) return "比劫";
        if (otherWx === nextElement(dmWx)) return "食伤";
        if (otherWx === controls(dmWx)) return "财";
        if (otherWx === controlledBy(dmWx)) return "官杀";
        return "印";
      }

      function parsePillar(pillar) {
        if (typeof pillar !== "string" || pillar.length < 2) throw friendlyError("Calendar result is incomplete.");
        return { stem: pillar[0], branch: pillar[1] };
      }

      function wallTimeUtcMs(parts) {
        const date = new Date(0);
        date.setUTCFullYear(parts.year, parts.month - 1, parts.day);
        date.setUTCHours(parts.hour, 0, 0, 0);
        return date.getTime();
      }

      function utcParts(timestamp) {
        const date = new Date(timestamp);
        return {
          year: date.getUTCFullYear(),
          month: date.getUTCMonth() + 1,
          day: date.getUTCDate(),
          hour: date.getUTCHours()
        };
      }

      function normalizeToUtc8(original) {
        const originalWallTimeMs = wallTimeUtcMs(original);
        const birthInstantUtcMs = originalWallTimeMs - original.timezoneOffsetMinutes * MINUTE_MS;
        const normalizedToUtc8 = utcParts(birthInstantUtcMs + UTC8_OFFSET_MINUTES * MINUTE_MS);
        return { birthInstantUtcMs, normalizedToUtc8 };
      }

      function validateInput(input) {
        if (!input || typeof input !== "object") throw friendlyError("Please provide a valid birth date.");
        const original = {
          year: Number(input.year),
          month: Number(input.month),
          day: Number(input.day),
          hour: input.hour === undefined || input.hour === null || input.hour === "" ? 12 : Number(input.hour),
          timezoneOffsetMinutes: input.timezoneOffsetMinutes === undefined || input.timezoneOffsetMinutes === null || input.timezoneOffsetMinutes === ""
            ? UTC8_OFFSET_MINUTES
            : Number(input.timezoneOffsetMinutes)
        };
        const currentYear = input.currentYear === undefined ? new Date().getFullYear() : Number(input.currentYear);
        const integers = ["year", "month", "day", "hour", "timezoneOffsetMinutes"];
        if (integers.some((key) => !Number.isInteger(original[key])) || !Number.isInteger(currentYear)) {
          throw friendlyError("Please provide a valid birth date.");
        }
        if (original.hour < 0 || original.hour > 23) throw friendlyError("Please provide an hour between 0 and 23.");
        if (
          original.timezoneOffsetMinutes < MIN_TIMEZONE_OFFSET_MINUTES ||
          original.timezoneOffsetMinutes > MAX_TIMEZONE_OFFSET_MINUTES
        ) throw friendlyError("Please provide a valid timezone.");
        const wallTimeMs = wallTimeUtcMs(original);
        const wallTime = utcParts(wallTimeMs);
        if (
          wallTime.year !== original.year ||
          wallTime.month !== original.month ||
          wallTime.day !== original.day ||
          wallTime.hour !== original.hour
        ) throw friendlyError("Please provide a valid birth date.");
        const conversion = normalizeToUtc8(original);
        if (conversion.birthInstantUtcMs > Date.now()) throw friendlyError("Birth date cannot be in the future.");
        return {
          original,
          normalizedToUtc8: conversion.normalizedToUtc8,
          currentYear
        };
      }

      function validatePokedex(data) {
        if (!Array.isArray(data) || !data.length) throw friendlyError("Pokemon data is unavailable.");
        const required = ["num", "name", "types", "baseStats", "evos", "prevo", "chainId", "stageIndex", "chainStages", "finalForms", "finalTypeCombo", "isLegendary"];
        const invalid = data.find((entry) => required.some((key) => !(key in entry)));
        if (invalid) throw friendlyError(`Pokemon data is incomplete near ${invalid.name || "an unknown entry"}.`);
        return data;
      }

      async function loadPokedex() {
        if (pokedexCache) return pokedexCache;
        if (!pokedexPromise) {
          pokedexPromise = fetch(POKEDEX_URL)
            .then((response) => {
              if (!response.ok) throw friendlyError("Pokemon data could not be loaded.");
              return response.json();
            })
            .then(validatePokedex)
            .then((data) => {
              pokedexCache = data;
              return data;
            })
            .catch((error) => {
              pokedexPromise = null;
              if (error.name === "PokemonSoulAlgorithmError") throw error;
              throw friendlyError("Pokemon data could not be loaded.");
            });
        }
        return pokedexPromise;
      }

      function getBazi(input) {
        if (!window.Solar || typeof window.Solar.fromYmdHms !== "function") {
          throw friendlyError("Calendar service is unavailable. Please try again later.");
        }
        try {
          return window.Solar.fromYmdHms(input.year, input.month, input.day, input.hour, 0, 0).getLunar().getBaZi();
        } catch (error) {
          throw friendlyError("The birth date could not be calculated.");
        }
      }

      function calculateShares(parsedPillars) {
        const totals = emptyElements();
        parsedPillars.forEach((pillar, pillarIndex) => {
          totals[STEM_TO_WUXING[pillar.stem]] += 1;
          const monthMultiplier = pillarIndex === 1 ? 1.4 : 1;
          (BRANCH_HIDDEN_STEMS[pillar.branch] || []).forEach((stem, hiddenIndex) => {
            totals[STEM_TO_WUXING[stem]] += (HIDDEN_WEIGHTS[hiddenIndex] || 0) * monthMultiplier;
          });
        });
        return normalizeMap(totals);
      }

      function calculateStructure(parsedPillars, dmWx) {
        const totals = { "比劫": 0, "食伤": 0, "财": 0, "官杀": 0, "印": 0 };
        parsedPillars.forEach((pillar, pillarIndex) => {
          const pillarMultiplier = pillarIndex === 1 ? 1.5 : 1;
          totals[relationToTenGod(dmWx, STEM_TO_WUXING[pillar.stem])] += pillarMultiplier;
          (BRANCH_HIDDEN_STEMS[pillar.branch] || []).forEach((stem, hiddenIndex) => {
            totals[relationToTenGod(dmWx, STEM_TO_WUXING[stem])] += (HIDDEN_WEIGHTS[hiddenIndex] || 0) * pillarMultiplier;
          });
        });
        return normalizeMap(totals);
      }

      function calculateStrength(shares, dmWx, monthBranch) {
        const peer = shares[dmWx];
        const resource = shares[previousElement(dmWx)];
        const output = shares[nextElement(dmWx)];
        const wealth = shares[controls(dmWx)];
        const power = shares[controlledBy(dmWx)];
        const base = (peer + 0.8 * resource) - (0.9 * power + 0.6 * wealth + 0.4 * output);
        const season = SEASON_BY_BRANCH[monthBranch];
        const state = SEASON_STATES[season][dmWx];
        const coefficient = SEASON_COEFFICIENTS[state];
        const strength = round(base + coefficient);
        const strengthLabel = strength > 0.18 ? "strong" : strength < -0.18 ? "weak" : "balanced";
        return { strength, strengthLabel, season, seasonState: state, seasonCoefficient: coefficient };
      }

      function chooseUseful(shares, dmWx, strengthLabel, seed) {
        let candidates;
        if (strengthLabel === "weak") candidates = [previousElement(dmWx), dmWx];
        else if (strengthLabel === "strong") candidates = [controlledBy(dmWx), nextElement(dmWx), controls(dmWx)];
        else {
          candidates = ELEMENTS.filter((element) => shares[element] > 0);
          if (!candidates.length) candidates = ELEMENTS;
        }
        return stableSort(candidates, (element) => shares[element], seed, "useful", false)[0];
      }

      function pickGate(dmWx, strength, structure, shares, useful) {
        const domain = DOMAIN_MAP[dmWx];
        const strengthLabel = strength > 0.18 ? "strong" : strength < -0.18 ? "weak" : "balanced";
        if (strengthLabel === "balanced") return [...domain];

        const preferredAffinities = strengthLabel === "strong"
          ? new Set(["财", "食伤", "比劫"])
          : new Set(["印", "官杀"]);
        let gate = domain.filter((type) => preferredAffinities.has(TYPE_AFFINITY[type]));

        const pressure = structure["官杀"] || 0;
        if (strengthLabel === "weak" && pressure > 0.28) {
          const supported = gate.filter((type) => TYPE_AFFINITY[type] === "印" || DOMAIN_MAP[useful].includes(type));
          if (supported.length) gate = supported;
        }
        if (strengthLabel === "strong" && shares[dmWx] > 0.32) {
          const expressive = gate.filter((type) => TYPE_AFFINITY[type] === "食伤" || TYPE_AFFINITY[type] === "财");
          if (expressive.length) gate = expressive;
        }
        return gate.length ? gate : [...domain];
      }

      function emptyTypeScores() {
        return Object.fromEntries(Object.values(DOMAIN_MAP).flat().map((type) => [type, 0]));
      }

      function addProjectionScores(scores, pivotElement, sourceElement, amount, factor = 1) {
        if (!pivotElement || !sourceElement || !amount) return;
        const role = relationToTenGod(pivotElement, sourceElement);
        const row = ROLE_TYPE_PROJECTION[pivotElement]?.[role] || {};
        Object.entries(row).forEach(([type, weight]) => {
          scores[type] = round((scores[type] || 0) + amount * factor * weight);
        });
      }

      function normalizeTypeScores(scores) {
        const total = Object.values(scores).reduce((sum, value) => sum + Math.max(0, value), 0);
        if (!total) return Object.fromEntries(Object.keys(scores).map((type) => [type, 0]));
        return Object.fromEntries(Object.entries(scores).map(([type, value]) => [type, round(Math.max(0, value) / total)]));
      }

      function mainElementWeights(parsedPillars) {
        const weights = emptyElements();
        parsedPillars.forEach((pillar, pillarIndex) => {
          if (pillarIndex !== 2) weights[STEM_TO_WUXING[pillar.stem]] += 1;
          (BRANCH_HIDDEN_STEMS[pillar.branch] || []).forEach((stem, hiddenIndex) => {
            weights[STEM_TO_WUXING[stem]] += HIDDEN_WEIGHTS[hiddenIndex] || 0;
          });
        });
        return Object.fromEntries(Object.entries(weights).map(([element, value]) => [element, round(value)]));
      }

      function hiddenElementWeights(parsedPillars) {
        const weights = emptyElements();
        parsedPillars.forEach((pillar) => {
          (BRANCH_HIDDEN_STEMS[pillar.branch] || []).forEach((stem, hiddenIndex) => {
            weights[STEM_TO_WUXING[stem]] += HIDDEN_WEIGHTS[hiddenIndex] || 0;
          });
        });
        return Object.fromEntries(Object.entries(weights).map(([element, value]) => [element, round(value)]));
      }

      function chooseMainType(dmWx, useful, shares, structure, strength, seed, parsedPillars = null) {
        const domain = DOMAIN_MAP[dmWx];
        const elementWeights = parsedPillars ? mainElementWeights(parsedPillars) : Object.fromEntries(ELEMENTS.map((element) => [element, shares[element] || 0]));
        const rawScores = Object.fromEntries(domain.map((type) => [type, 0]));
        ELEMENTS.forEach((sourceElement) => {
          addProjectionScores(rawScores, dmWx, sourceElement, elementWeights[sourceElement] || 0);
        });
        const mainType = stableSort(domain, (type) => rawScores[type] || 0, seed, "main-type-v4")[0];
        return {
          mainType,
          scores: normalizeTypeScores(rawScores),
          rawScores: Object.fromEntries(domain.map((type) => [type, round(rawScores[type] || 0)])),
          gate: [...domain],
          elementWeights,
          projectionVersion: "ROLE_TYPE_PROJECTION_V6_7_SPECIFIC_BAZI_MATCH_HASH"
        };
      }

      function chooseSubType(mainType, parsedPillars, seed) {
        const pivots = [parsedPillars[0].stem, parsedPillars[1].stem, parsedPillars[3].stem]
          .map((stem, index) => ({ stem, index, element: STEM_TO_WUXING[stem] }))
          .filter((pivot) => pivot.element);
        const sourceWeights = hiddenElementWeights(parsedPillars);
        const rawScores = emptyTypeScores();
        const pivotScores = [];
        const adjustedSourceWeights = Object.fromEntries(ELEMENTS.map((element) => [
          element,
          round((sourceWeights[element] || 0) * (SECONDARY_SOURCE_ELEMENT_FACTOR[element] ?? 1))
        ]));
        pivots.forEach((pivot) => {
          const factor = SECONDARY_PIVOT_FACTOR[pivot.element] ?? 1;
          const localScores = Object.fromEntries(DOMAIN_MAP[pivot.element].map((type) => [type, 0]));
          ELEMENTS.forEach((sourceElement) => {
            const adjustedWeight = adjustedSourceWeights[sourceElement] || 0;
            addProjectionScores(localScores, pivot.element, sourceElement, adjustedWeight, factor);
            addProjectionScores(rawScores, pivot.element, sourceElement, adjustedWeight, factor);
          });
          pivotScores.push({
            stem: pivot.stem,
            pillarIndex: pivot.index,
            element: pivot.element,
            factor,
            rawScores: Object.fromEntries(Object.entries(localScores).map(([type, value]) => [type, round(value)])),
            scores: normalizeTypeScores(localScores)
          });
        });
        const typeOrder = Object.keys(rawScores).sort((left, right) => {
          const delta = (rawScores[right] || 0) - (rawScores[left] || 0);
          return delta || fnv1a(`${seed}|secondary-type-v4|${left}`) - fnv1a(`${seed}|secondary-type-v4|${right}`);
        }).filter((type) => (rawScores[type] || 0) > 0);
        const subType = typeOrder[0] || null;
        return {
          subType,
          scores: Object.fromEntries(Object.entries(rawScores).map(([type, value]) => [type, round(value)])),
          weights: normalizeTypeScores(rawScores),
          sample: null,
          typeOrder,
          pivots: pivotScores,
          sourceWeights,
          adjustedSourceWeights,
          sourceElementFactor: SECONDARY_SOURCE_ELEMENT_FACTOR,
          method: "tri_stem_hidden_source_projection_v6"
        };
      }

      function orderedComboKey(types) {
        return [...new Set(types)].join("|");
      }

      function comboKey(types) {
        return [...new Set(types)].sort().join("|");
      }

      function normalizeTypeCombo(mainType, secondaryType) {
        return secondaryType && secondaryType !== mainType ? [mainType, secondaryType] : [mainType];
      }

      function buildTypeComboCandidates(mainType, secondaryTypeOrder, secondaryTypeScores = null) {
        const seen = new Set();
        const candidates = [];
        const orderedTypes = secondaryTypeOrder && secondaryTypeOrder.length ? [...secondaryTypeOrder] : [mainType];
        const firstType = orderedTypes[0] || mainType;
        const fallbackTypes = orderedTypes.slice(1).sort((left, right) => {
          const leftScore = (secondaryTypeScores?.[left] || 0) * (SECONDARY_FALLBACK_FACTOR[left] ?? 1);
          const rightScore = (secondaryTypeScores?.[right] || 0) * (SECONDARY_FALLBACK_FACTOR[right] ?? 1);
          const delta = rightScore - leftScore;
          return delta || orderedTypes.indexOf(left) - orderedTypes.indexOf(right);
        });
        [firstType, ...fallbackTypes].forEach((secondaryType) => {
          const combo = normalizeTypeCombo(mainType, secondaryType);
          const key = orderedComboKey(combo);
          if (!seen.has(key)) {
            seen.add(key);
            candidates.push(combo);
          }
        });
        const singleKey = orderedComboKey([mainType]);
        if (!seen.has(singleKey)) candidates.push([mainType]);
        return candidates;
      }

      function createChainIndex(pokedex) {
        const entriesByName = new Map(pokedex.map((entry) => [entry.name, entry]));
        const groups = new Map();
        pokedex.forEach((entry) => {
          if (!groups.has(entry.chainId)) groups.set(entry.chainId, []);
          groups.get(entry.chainId).push(entry);
        });
        const chains = [...groups.entries()].map(([chainId, entries]) => {
          const finalNames = [...new Set(entries.flatMap((entry) => entry.finalForms))];
          const finals = finalNames.map((name) => entriesByName.get(name)).filter(Boolean);
          const combos = [...new Set(entries.flatMap((entry) =>
            (entry.finalTypeCombos || [entry.finalTypeCombo]).map(comboKey)
          ))];
          const orderedCombos = [...new Set(entries.flatMap((entry) =>
            (entry.finalTypeCombos || [entry.finalTypeCombo]).map(orderedComboKey)
          ))];
          return { chainId, entries, finals, combos, orderedCombos };
        });
        return { entriesByName, chains };
      }

      function statPreference(structure, seed) {
        const tenGods = stableSort(Object.keys(TEN_GOD_TO_STAT), (key) => structure[key], seed, "stat-preference");
        return [...tenGods.map((key) => TEN_GOD_TO_STAT[key]), "hp"];
      }

      function statTuple(entry, preference) {
        const preferenceIndex = Object.fromEntries(preference.map((stat, index) => [stat, index]));
        return [...STAT_PRIORITY]
          .sort((left, right) => {
            const delta = entry.baseStats[right] - entry.baseStats[left];
            return delta || STAT_PRIORITY.indexOf(left) - STAT_PRIORITY.indexOf(right);
          })
          .map((stat) => preferenceIndex[stat]);
      }

      function compareTuple(left, right) {
        for (let index = 0; index < Math.max(left.length, right.length); index += 1) {
          const delta = (left[index] ?? 999) - (right[index] ?? 999);
          if (delta) return delta;
        }
        return 0;
      }

      function chooseFinal(chain, targetTypes, dominantElement, preference, seed) {
        const exact = chain.finals.filter((entry) => orderedComboKey(entry.types) === orderedComboKey(targetTypes));
        const mainMatches = chain.finals.filter((entry) => entry.types.includes(targetTypes[0]));
        let candidates = exact.length ? exact : mainMatches.length ? mainMatches : chain.finals;
        const dominantTypes = DOMAIN_MAP[dominantElement];
        const dominantMatches = candidates.filter((entry) => entry.types.some((type) => dominantTypes.includes(type)));
        if (dominantMatches.length) candidates = dominantMatches;
        return [...candidates].sort((left, right) => {
          const tupleDelta = compareTuple(statTuple(left, preference), statTuple(right, preference));
          return tupleDelta || fnv1a(`${seed}|final|${left.name}`) - fnv1a(`${seed}|final|${right.name}`);
        })[0];
      }

      function chooseChain(pokedex, typeComboCandidates, structure, shares, seed, allowLegendary) {
        const { entriesByName, chains } = createChainIndex(pokedex);
        const eligible = chains.filter((chain) => chain.finals.some((entry) => Boolean(entry.isLegendary) === allowLegendary));
        let candidatesToTry = (Array.isArray(typeComboCandidates?.[0]) ? typeComboCandidates : [typeComboCandidates])
          .filter((combo) => Array.isArray(combo) && combo.length);
        candidatesToTry = applyForcedTypeComboOverride(seed, candidatesToTry);
        const primaryType = candidatesToTry[0]?.[0];
        let candidates = [];
        let selectedTargetTypes = candidatesToTry[0] || [];
        let fallback = "exact";
        for (const candidateCombo of candidatesToTry) {
          const exactKey = orderedComboKey(candidateCombo);
          const exactCandidates = eligible.filter((chain) => chain.orderedCombos.includes(exactKey));
          if (exactCandidates.length) {
            candidates = exactCandidates;
            selectedTargetTypes = candidateCombo;
            fallback = candidateCombo === candidatesToTry[0] ? "exact" : "ordered-secondary-rank";
            break;
          }
        }
        if (!candidates.length) {
          candidates = eligible.filter((chain) => chain.finals.some((entry) => entry.types[0] === primaryType));
          fallback = "main-primary";
        }
        if (!candidates.length) {
          candidates = eligible.filter((chain) => chain.finals.some((entry) => entry.types.includes(primaryType)));
          fallback = "main-type";
        }
        if (!candidates.length) {
          const relatedTypes = new Set(Object.entries(DOMAIN_MAP)
            .filter(([, types]) => types.includes(primaryType))
            .flatMap(([, types]) => types));
          candidates = eligible.filter((chain) => chain.finals.some((entry) => entry.types.some((type) => relatedTypes.has(type))));
          fallback = "near-domain";
        }
        if (!candidates.length) {
          candidates = eligible;
          fallback = "eligible-pool";
        }
        if (!candidates.length) throw friendlyError("No matching Pokemon could be found.");

        const preference = statPreference(structure, seed);
        const dominantElement = stableSort(ELEMENTS, (element) => shares[element], seed, "dominant-element")[0];
        const ranked = candidates.map((chain) => {
          const final = chooseFinal(chain, selectedTargetTypes, dominantElement, preference, seed);
          return { chain, final, tuple: statTuple(final, preference), overridePriority: matchOverridePriority(seed, selectedTargetTypes, chain, final) };
        }).sort((left, right) => {
          const overrideDelta = left.overridePriority - right.overridePriority;
          if (overrideDelta) return overrideDelta;
          const tupleDelta = compareTuple(left.tuple, right.tuple);
          return tupleDelta || fnv1a(`${seed}|chain|${left.chain.chainId}`) - fnv1a(`${seed}|chain|${right.chain.chainId}`);
        });
        return {
          ...ranked[0],
          fallback,
          candidateCount: candidates.length,
          entriesByName,
          preference,
          dominantElement,
          targetTypes: [...selectedTargetTypes],
          triedTypeCombos: candidatesToTry.map((combo) => [...combo])
        };
      }

      function buildSelectedPath(finalEntry, entriesByName) {
        const path = [];
        let current = finalEntry;
        const seen = new Set();
        while (current && !seen.has(current.name)) {
          seen.add(current.name);
          path.unshift(current);
          current = current.prevo ? entriesByName.get(current.prevo) : null;
        }
        return path;
      }

      function usefulPillarIndex(parsedPillars, useful, seed) {
        const scores = parsedPillars.map((pillar) => {
          let score = STEM_TO_WUXING[pillar.stem] === useful ? 1 : 0;
          (BRANCH_HIDDEN_STEMS[pillar.branch] || []).forEach((stem, index) => {
            if (STEM_TO_WUXING[stem] === useful) score += HIDDEN_WEIGHTS[index] || 0;
          });
          return score;
        });
        return stableSort([0, 1, 2, 3], (index) => scores[index], seed, "useful-pillar")[0];
      }

      function calculatePeakWindow(pillarIndex) {
        if (pillarIndex === 0) return { start: 25, end: 40, pattern: "early" };
        if (pillarIndex === 3) return { start: 45, end: 60, pattern: "late" };
        return { start: 35, end: 50, pattern: "steady" };
      }

      function calculateEnergy(age, peakWindow) {
        const { start, end } = peakWindow;
        if (age <= start - 16) return 0;
        if (age < start) return round((age - (start - 16)) / 16);
        if (age <= end) return 1;
        if (age < end + 20) return round(1 - (age - end) / 20);
        return 0;
      }

      function calculateMatchConfidence(pokedex, typeComboCandidates) {
        const candidates = (Array.isArray(typeComboCandidates?.[0]) ? typeComboCandidates : [typeComboCandidates])
          .filter((combo) => Array.isArray(combo) && combo.length);
        const exact = candidates.some((candidate) => {
          const target = orderedComboKey(candidate);
          return pokedex.some((entry) => (entry.finalTypeCombos || [entry.finalTypeCombo]).some((types) => orderedComboKey(types) === target));
        });
        if (exact) return 1;
        const primaryType = candidates[0]?.[0];
        const main = pokedex.some((entry) => entry.finalTypeCombo?.[0] === primaryType || entry.finalTypeCombo?.includes(primaryType));
        return main ? 0.65 : 0.35;
      }

      function calculateQuality(shares, structure, useful, parsedPillars, seasonCoefficient, matchConfidence) {
        const values = Object.values(shares);
        const coverage = values.filter((value) => value > 0.03).length / ELEMENTS.length;
        const evenness = 1 - clamp(values.reduce((sum, value) => sum + Math.abs(value - 0.2), 0) / 1.6, 0, 1);
        const balanceScore = clamp(0.45 * coverage + 0.55 * evenness, 0, 1);
        const dominantStructure = Math.max(...Object.values(structure));
        const clarityScore = clamp((dominantStructure - 0.20) / 0.40, 0, 1);
        const usefulStrength = clamp((shares[useful] - 0.06) / 0.28, 0, 1);
        const seasonSupport = clamp((seasonCoefficient + 0.30) / 0.65, 0, 1);
        const matchScore = clamp(matchConfidence, 0, 1);
        const branches = parsedPillars.map((pillar) => pillar.branch);
        let clashes = 0;
        for (let left = 0; left < branches.length; left += 1) {
          for (let right = left + 1; right < branches.length; right += 1) {
            if (CLASH_PAIRS.has(branches[left] + branches[right])) clashes += 1;
          }
        }
        const clashScore = clamp(1 - clashes / 3, 0, 1);
        const components = { balanceScore, clarityScore, usefulStrength, seasonSupport, matchScore, clashScore };
        const weighted = (
          0.20 * balanceScore +
          0.24 * clarityScore +
          0.20 * usefulStrength +
          0.14 * seasonSupport +
          0.12 * matchScore +
          0.10 * clashScore
        );
        const quality = clamp((weighted - 0.28) / 0.52, 0, 1);
        return {
          quality: round(quality),
          components: Object.fromEntries(Object.entries(components).map(([key, value]) => [key, round(value)])),
          weighted: round(weighted),
          clashes
        };
      }

      function publicSpecies(entry) {
        return {
          num: entry.num,
          name: entry.name,
          types: [...entry.types],
          baseStats: { ...entry.baseStats },
          chainId: entry.chainId,
          stageIndex: entry.stageIndex,
          chainStages: entry.chainStages,
          isLegendary: entry.isLegendary
        };
      }

      function explanationFeatures(selectedSpecies, typeCombo, stageIndex, chainStages) {
        const stats = Object.entries(selectedSpecies.baseStats).sort((a, b) => b[1] - a[1]);
        const statPhrases = {
          hp: "keeps going through long stretches", atk: "acts with direct force",
          def: "holds steady under pressure", spa: "expresses power with precision",
          spd: "absorbs pressure without losing focus", spe: "moves before the moment passes"
        };
        const phase = chainStages === 1 ? "a complete form" : stageIndex === chainStages ? "a fully opened phase" : "a growing phase";
        return {
          temperament: selectedSpecies.types.includes("Ghost") ? "quietly observant" : "steady and attentive",
          actionStyle: statPhrases[stats[0][0]],
          growthDirection: typeCombo.length > 1 ? "combines two different strengths" : "deepens one clear strength",
          pressurePattern: statPhrases[stats.find(([stat]) => stat === "def" || stat === "spd")?.[0] || stats[0][0]],
          currentPhase: phase,
          pokemonSimilarityHooks: [
            `${selectedSpecies.name} carries ${selectedSpecies.types.join(" and ")} traits`,
            statPhrases[stats[0][0]],
            phase
          ]
        };
      }

      async function calculatePokemonSoul(rawInput) {
        const input = validateInput(rawInput);
        const pokedex = await loadPokedex();
        const bazi = getBazi(input.normalizedToUtc8);
        const parsedPillars = bazi.map(parsePillar);
        const dmWx = STEM_TO_WUXING[parsedPillars[2].stem];
        if (!dmWx) throw friendlyError("The birth date could not be calculated.");
        const baziString = bazi.join("");
        const shares = calculateShares(parsedPillars);
        const structure = calculateStructure(parsedPillars, dmWx);
        const strengthResult = calculateStrength(shares, dmWx, parsedPillars[1].branch);
        const useful = chooseUseful(shares, dmWx, strengthResult.strengthLabel, baziString);
        const mainResult = chooseMainType(dmWx, useful, shares, structure, strengthResult.strength, baziString, parsedPillars);
        const subResult = chooseSubType(mainResult.mainType, parsedPillars, baziString);
        const rawTypeCombo = normalizeTypeCombo(mainResult.mainType, subResult.subType);
        const typeComboCandidates = buildTypeComboCandidates(mainResult.mainType, subResult.typeOrder, subResult.scores);
        const matchConfidence = calculateMatchConfidence(pokedex, typeComboCandidates);
        const qualityResult = calculateQuality(
          shares,
          structure,
          useful,
          parsedPillars,
          strengthResult.seasonCoefficient,
          matchConfidence
        );
        const quality = qualityResult.quality;
        let allowLegendary = quality > LEGENDARY_QUALITY_THRESHOLD;
        let chainResult;
        try {
          chainResult = chooseChain(pokedex, typeComboCandidates, structure, shares, baziString, allowLegendary);
        } catch (error) {
          if (!allowLegendary) throw error;
          allowLegendary = false;
          chainResult = chooseChain(pokedex, typeComboCandidates, structure, shares, baziString, false);
          chainResult.legendaryFallback = true;
        }
        const typeCombo = chainResult.targetTypes && chainResult.targetTypes.length ? chainResult.targetTypes : rawTypeCombo;
        const selectedSubType = typeCombo.length > 1 ? typeCombo[1] : typeCombo[0];
        const selectedPath = buildSelectedPath(chainResult.final, chainResult.entriesByName);
        const chainStages = Math.max(1, selectedPath.length);
        const age = clamp(input.currentYear - input.original.year, 0, 130);
        const peakWindow = calculatePeakWindow(usefulPillarIndex(parsedPillars, useful, baziString));
        const energy = calculateEnergy(age, peakWindow);
        const stageIndex = chainStages === 1 ? 1 : clamp(Math.round(energy * (chainStages - 1)) + 1, 1, chainStages);
        const selectedSpecies = selectedPath[stageIndex - 1] || selectedPath[0] || chainResult.final;
        const features = explanationFeatures(selectedSpecies, typeCombo, stageIndex, chainStages);

        return {
          input,
          bazi,
          dmWx,
          shares,
          structure,
          strength: strengthResult.strength,
          strengthLabel: strengthResult.strengthLabel,
          useful,
          mainType: mainResult.mainType,
          subType: selectedSubType,
          typeCombo,
          selectedChainId: chainResult.chain.chainId,
          selectedSpecies: publicSpecies(selectedSpecies),
          chain: selectedPath.map(publicSpecies),
          stageIndex,
          chainStages,
          age,
          energy,
          peakWindow,
          quality,
          isLegendaryResult: allowLegendary && Boolean(chainResult.final.isLegendary),
          explanationFeatures: features,
          debug: {
            fallback: chainResult.fallback,
            legendaryFallback: Boolean(chainResult.legendaryFallback),
            candidateCount: chainResult.candidateCount,
            dominantElement: chainResult.dominantElement,
            statPreference: chainResult.preference,
            mainTypeScores: mainResult.scores,
            mainTypeGate: mainResult.gate,
            subTypeSelection: {
              scores: subResult.scores,
              weights: subResult.weights,
              sample: subResult.sample,
              selected: selectedSubType,
              rawSelected: subResult.subType,
              rawTypeCombo,
              selectedTypeCombo: typeCombo,
              typeComboCandidates,
              typeOrder: subResult.typeOrder,
              method: subResult.method,
              pivots: subResult.pivots,
              sourceWeights: subResult.sourceWeights,
              adjustedSourceWeights: subResult.adjustedSourceWeights,
              domainFactor: SECONDARY_PIVOT_FACTOR,
              sourceElementFactor: SECONDARY_SOURCE_ELEMENT_FACTOR,
              fallbackFactor: SECONDARY_FALLBACK_FACTOR
            },
            qualityComponents: qualityResult.components,
            qualityWeightedScore: qualityResult.weighted,
            qualityClashes: qualityResult.clashes,
            matchConfidence,
            season: strengthResult.season,
            seasonState: strengthResult.seasonState,
            seasonCoefficient: strengthResult.seasonCoefficient,
            timezoneConversion: {
              original: input.original,
              normalizedToUtc8: input.normalizedToUtc8
            }
          }
        };
      }

      function assert(condition, message) {
        if (!condition) throw new Error(message);
      }

      function visibleTestText(results) {
        return results.map((result) => `${result.pass ? "PASS" : "FAIL"} ${result.name}${result.pass ? "" : `: ${result.error}`}`).join("\n");
      }

      async function findEliteRealitySample() {
        for (let year = 1900; year <= 2025; year += 1) {
          for (const month of [3, 6, 9, 12]) {
            for (const hour of [0, 12]) {
              const input = { year, month, day: 15, hour, currentYear: 2026 };
              const result = await calculatePokemonSoul(input);
              if (result.quality > LEGENDARY_QUALITY_THRESHOLD) return { input, result };
            }
          }
        }
        return null;
      }

        Bug: "运筹帷幄", Electric: "运筹帷幄", Poison: "运筹帷幄", Dark: "运筹帷幄",
        Fairy: "千锤百炼", Ghost: "千锤百炼", Ice: "千锤百炼"
      };
      const ENERGY_TAG = { strong: "能量外放", weak: "能量内收", balanced: "能量均衡" };
      const STAT_TAG = {
        hp: "持之以恒", atk: "雷厉风行", spe: "当机立断", def: "处变不惊", spd: "处变不惊", spa: "入木三分"
      };
      const TYPE_BEHAVIOR_TAG = {
        Psychic: "静观其变", Ghost: "静观其变", Poison: "坚守底线", Dark: "三思后行", Water: "随机应变"
      };
      const STAGE_TAG = { rising: "正在成形", peak: "稳定展开", settling: "安静积累", single: "完成式" };

      function validateVisibleCopy(text) {
        const visibleText = String(text ?? "");
        const issues = [];
        FORBIDDEN_COPY_TERMS.forEach((term) => {
          if (visibleText.includes(term)) issues.push(`包含禁用术语或过度承诺：${term}`);
        });
        FORBIDDEN_COPY_PATTERNS.forEach(({ label, pattern }) => {
          if (pattern.test(visibleText)) issues.push(`包含禁用句式：${label}`);
        });
        return issues;
      }

      function rankedScores(scoreObj) {
        return Object.entries(scoreObj || {})
          .map(([key, value]) => [key, Number(value) || 0])
          .filter(([, value]) => value > 0)
          .sort((left, right) => right[1] - left[1] || left[0].localeCompare(right[0]));
      }

      function isDecisiveMain(result) {
        const ranked = rankedScores(result?.debug?.mainTypeScores);
        if (ranked.length < 2) return true;
        return ranked[0][1] - ranked[1][1] >= 0.08;
      }

      function isDecisiveSub(result) {
        const scores = result?.debug?.subTypeSelection?.weights || result?.debug?.subTypeSelection?.scores;
        const ranked = rankedScores(scores);
        if (ranked.length < 2) return true;
        const top = ranked[0][1] || 1;
        return ranked[0][1] - ranked[1][1] >= Math.max(0.08, 0.18 * top);
      }

      function strongestStatKey(species) {
        const stats = species?.baseStats && typeof species.baseStats === "object" ? Object.entries(species.baseStats) : [];
        stats.sort((left, right) => right[1] - left[1] || left[0].localeCompare(right[0]));
        return stats[0]?.[0] || "hp";
      }

      function bestSubChannel(result, subType) {
        const pivots = result?.debug?.subTypeSelection?.pivots || [];
        let best = null;
        let bestScore = -1;
        pivots.forEach((pivot) => {
          const score = Number(pivot?.scores?.[subType]) || Number(pivot?.rawScores?.[subType]) || 0;
          if (score > bestScore) { best = pivot; bestScore = score; }
        });
        return CHANNEL[best?.pillarIndex] || "你所处的环境";
      }

      function stageKind(result) {
        const stages = Number(result?.chainStages) || 1;
        if (stages <= 1) return "single";
        const age = Number(result?.age);
        const win = result?.peakWindow || {};
        if (Number.isFinite(age) && Number.isFinite(win.start) && Number.isFinite(win.end)) {
          if (age > win.end) return "settling";
          if (age >= win.start && age <= win.end) return "peak";
          return "rising";
        }
        return Number(result?.stageIndex) >= stages ? "peak" : "rising";
      }

      function stageSentence(result) {
        const kind = stageKind(result);
        if (kind === "single") return "它一生只有一种形态。有些生命从一开始便是完整的，你也是如此。";
        if (kind === "peak") return "你正处在状态的高点，因此与你相遇的，是它最舒展的形态。";
        if (kind === "settling") return "你的能量正从高点转入沉淀，它也回到了更为简练的形态，将力量收敛得更加节省。";
        return "你正处在上升的阶段，这只宝可梦也尚未抵达最终形态，你们都还在成长的途中。";
      }

      function buildTags(result, mainType, typeCombo, statKey) {
        const tags = [];
        const add = (value) => { if (value && !tags.includes(value)) tags.push(value); };
        add(ENERGY_TAG[result?.strengthLabel] || ENERGY_TAG.balanced);
        add(RELATION_TAG[mainType]);
        add(STAT_TAG[statKey]);
        add(TYPE_BEHAVIOR_TAG[mainType] || (typeCombo.length > 1 ? "双管齐下" : "从一而终"));
        add(STAGE_TAG[stageKind(result)]);
        if (result?.isLegendaryResult) {
          const base = tags.slice(0, 4);
          base.push("本相精纯");
          return base;
        }
        return tags.slice(0, 5);
      }

      function buildPokemonSoulExplanation(result) {
        const species = result?.selectedSpecies;
        if (!species?.name) {
          const fallback = {
            title: "博士还需要再观察一下",
            paragraphs: ["这次没有取得足够的宝可梦资料。等资料准备好后，再回来看看与你共鸣的伙伴。"],
            chips: [],
            internalSourceFields: []
          };
          const issues = validateVisibleCopy([fallback.title, ...fallback.paragraphs].join("\n"));
          if (issues.length) throw new Error(`Copywriter visible copy validation failed: ${issues.join("; ")}`);
          return fallback;
        }

        const name = species.name;
        const typeCombo = Array.isArray(result?.typeCombo) && result.typeCombo.length
          ? [...new Set(result.typeCombo)]
          : (Array.isArray(species.types) && species.types.length ? [...new Set(species.types)] : ["Normal"]);
        const mainType = result?.mainType || typeCombo[0] || "Normal";
        const subType = result?.subType || typeCombo[1] || mainType;
        const singleType = typeCombo.length <= 1 || mainType === subType;
        const statKey = strongestStatKey(species);

        const opening = `与你共鸣最深的是${name}。仔细观察它，会发现你们在行事方式上有不少相通之处。`;
        const mainParagraph = isDecisiveMain(result)
          ? `从你出生时刻的能量结构来看，${TYPE_ZH[mainType] || mainType}这一面最为明显。${TYPE_TRAIT[mainType] || TYPE_TRAIT.Normal}${DISPOSITION[result?.strengthLabel] || DISPOSITION.balanced}`
          : `你身上有两种几乎并列的倾向，它们都属于你。这一次率先显现的是${TYPE_ZH[mainType] || mainType}，另一种并未消失，只是暂时退居其次。${DISPOSITION[result?.strengthLabel] || DISPOSITION.balanced}`;
        const subParagraph = singleType
          ? "你的两面指向同一个方向，内外高度一致，这种情形比兼具双面更为少见。"
          : (isDecisiveSub(result)
            ? `从${bestSubChannel(result, subType)}还能看到你的另一面：${SUB_PHRASE[subType] || "稳定可靠"}，与主导的一面正好互补。`
            : `你的另一面存在几种可能，这一次它以${TYPE_ZH[subType] || subType}的形态呈现：${SUB_PHRASE[subType] || "稳定可靠"}。`);
        let closing = `${stageSentence(result)}${name}最擅长的是${STAT_PHRASE[statKey] || STAT_PHRASE.hp}，而这恰好也是你最突出的地方。`;
        if (result?.isLegendaryResult) {
          closing += "另外值得一提：你的能量结构在数据中相当少见，因此与你共鸣的是一只传说级宝可梦，这样的结果并不常见。";
        }

        const output = {
          title: "为什么这只宝可梦会愿意靠近你",
          paragraphs: [opening, mainParagraph, subParagraph, closing],
          chips: buildTags(result, mainType, typeCombo, statKey),
          internalSourceFields: [
            "selectedSpecies", "mainType", "subType", "typeCombo", "strengthLabel",
            "debug.mainTypeScores", "debug.subTypeSelection", "stageIndex", "chainStages",
            "energy", "peakWindow", "selectedSpecies.baseStats", "isLegendaryResult"
          ]
        };
        const issues = validateVisibleCopy([output.title, ...output.paragraphs, ...output.chips].join("\n"));
        if (issues.length) throw new Error(`Copywriter visible copy validation failed: ${issues.join("; ")}`);
        return output;
      }

      async function runCopywriterSelfTests() {
        const tests = [];
        async function test(name, callback) {
          try { await callback(); tests.push({ name, pass: true }); }
          catch (error) { tests.push({ name, pass: false, error: error.message }); }
        }
        function assert(condition, message) { if (!condition) throw new Error(message); }
        function visibleText(copy) { return [copy.title, ...(copy.paragraphs || []), ...(copy.chips || [])].join("\n"); }

        const normalResult = await window.PokemonSoulAlgorithm.calculatePokemonSoul({
          year: 1995, month: 6, day: 15, hour: 12, currentYear: 2026
        });
        await test("P6 result uses four fixed modules", async () => {
          const copy = buildPokemonSoulExplanation(normalResult);
          assert(copy.title === "为什么这只宝可梦会愿意靠近你", "title is not the P6 result title");
          assert(copy.paragraphs.length === 4, "P6 copy must contain four paragraphs");
          assert(copy.chips.length >= 4 && copy.chips.length <= 5, "tags must stay within P6 range");
        });
        await test("visible copy passes restricted-language validation", async () => {
          const copy = buildPokemonSoulExplanation(normalResult);
          assert(validateVisibleCopy(visibleText(copy)).length === 0, "visible copy contains restricted language");
        });
        await test("validator detects restricted language", async () => {
          assert(validateVisibleCopy("这不是停顿，而是专业排盘给出的绝对准确结论。掌控之力。命格。").length >= 4, "validator missed restricted language");
        });
        await test("missing selected species returns a friendly fallback", async () => {
          const copy = buildPokemonSoulExplanation({});
          assert(Boolean(copy.title) && copy.paragraphs.length === 1, "selected species fallback is incomplete");
        });
        await test("single-type result uses folded-side sentence", async () => {
          const copy = buildPokemonSoulExplanation({ ...normalResult, typeCombo: [normalResult.mainType], subType: normalResult.mainType });
          assert(copy.paragraphs.some((paragraph) => paragraph.includes("内外高度一致")), "single-type folded copy is missing");
        });
        await test("legendary copy avoids superiority claims", async () => {
          const copy = buildPokemonSoulExplanation({ ...normalResult, isLegendaryResult: true });
          const text = visibleText(copy);
          assert(text.includes("本相精纯") && text.includes("传说级宝可梦"), "legendary copy is missing its P6 additions");
          assert(!text.includes("比别人高级") && !text.includes("注定成功"), "legendary copy contains superiority claims");
          assert(validateVisibleCopy(text).length === 0, "legendary copy contains restricted language");
        });
        await test("copy generation is deterministic", async () => {
          const first = JSON.stringify(buildPokemonSoulExplanation(normalResult));
          const second = JSON.stringify(buildPokemonSoulExplanation(normalResult));
          assert(first === second, "copy changed between runs");
        });
        await test("copywriter module does not use Math.random", async () => {
          const source = [buildPokemonSoulExplanation, validateVisibleCopy, rankedScores, bestSubChannel, stageSentence]
            .map((fn) => fn.toString()).join("\n");
          assert(!source.includes("Math.random"), "copywriter module uses Math.random");
        });

        return {
          passed: tests.filter((item) => item.pass).length,
          failed: tests.filter((item) => !item.pass).length,
          tests
        };
      }

      window.PokemonSoulCopywriter = {
        buildPokemonSoulExplanation,
        validateVisibleCopy,
        runCopywriterSelfTests
      };
    })();
  </script>

      function showScreen(name) {
        Object.entries(screens).forEach(([key, screen]) => {

          screen.setAttribute("aria-hidden", String(!active));

      /* ---------- reels ---------- */
      const REPEAT = 4; // strip copies for seamless looping
      function buildReel(strip) {
        strip.replaceChildren();
        for (let copy = 0; copy < REPEAT; copy += 1) {
          REEL_ORDER.forEach((type) => {
            const cell = document.createElement("div");
            cell.className = "cell";
            cell.dataset.type = type;
            const img = document.createElement("img");
            img.src = TYPE_ICONS[type];
            img.alt = "";
            cell.append(img);
            strip.append(cell);
          });
        }
      }

      function cellSize() {
        const win = machineEl.querySelector(".reel-window");
        return Math.max(40, Math.round(win.clientHeight / 3.6));
      }
      function syncReelMetrics() {
        const cell = cellSize();
        machineEl.style.setProperty("--cell", cell + "px");
        machineEl.style.setProperty("--loop", `-${cell * REEL_ORDER.length}px`);
        return cell;
      }

      function currentTranslateY(el) {
        const transform = getComputedStyle(el).transform;
        if (!transform || transform === "none") return 0;
        const parts = transform.match(/matrix\(([^)]+)\)/);
        if (!parts) return 0;
        return Number(parts[1].split(",")[5]) || 0;
      }

      function startSpin(strip) {
        strip.style.transition = "none";
        strip.style.transform = "";
        strip.classList.add("spinning");
        strip.querySelectorAll(".cell").forEach((cell) => cell.classList.remove("hit"));
      }

      function stopReelAt(strip, type) {
        return new Promise((resolve) => {
          const cell = syncReelMetrics();
          const winH = strip.parentElement.clientHeight;
          const loop = cell * REEL_ORDER.length;
          const idx = Math.max(0, REEL_ORDER.indexOf(type));
          // freeze at the animation's current offset
          const frozen = currentTranslateY(strip);
          strip.classList.remove("spinning");
          strip.style.transition = "none";
          strip.style.transform = `translateY(${frozen}px)`;
          // target: chosen pill (second-to-last copy) centered in the window
          const targetIndex = REEL_ORDER.length * (REPEAT - 2) + idx;
          const target = -(targetIndex * cell) + (winH - cell) / 2;
          // normalize the frozen offset into (-loop, 0]; since the target sits in a
          // later strip copy it is always further down, so the reel keeps rolling forward
          const from = ((frozen % loop) + loop) % loop - loop;
          requestAnimationFrame(() => {
            strip.style.transform = `translateY(${from}px)`;
            requestAnimationFrame(() => {
              strip.style.transition = "transform 1.25s cubic-bezier(.16,.9,.26,1.04)";
              strip.style.transform = `translateY(${target}px)`;
              const done = () => {
                strip.removeEventListener("transitionend", done);
                const hit = strip.children[targetIndex];
                if (hit) hit.classList.add("hit");
                resolve();
              };
              strip.addEventListener("transitionend", done);
              setTimeout(done, 1500); // safety
            });
          });
        });
      }

      function signalLines(result) {
        const scores = result?.debug?.mainTypeScores || {};
        const positive = Object.entries(scores).filter(([, v]) => Number(v) > 0);
        const total = positive.reduce((sum, [, v]) => sum + Number(v), 0);
        if (!positive.length || !(total > 0)) return [];
        return positive
          .sort((a, b) => b[1] - a[1])
          .slice(0, 3)
          .map(([type, v]) => `${TYPE_CN[type] || type}系能量 ${(100 * v / total).toFixed(1)}%`);
      }

      /* ---------- result rendering ---------- */
      function uniqueList(items) {
        return Array.from(new Set(items.filter(Boolean)));
      }

      function normalizePokemonName(name) {
        return String(name || "")
          .trim()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/[’']/g, "");
      }

      const SPRITE_SLUG_ALIASES = {
        "basculin-blue-striped": ["basculin-bluestriped"],
        "basculin-white-striped": ["basculin-whitestriped"],
        "tauros-paldea-aqua": ["tauros-paldeaaqua", "tauros-paldea-aqua-breed"],
        "tauros-paldea-blaze": ["tauros-paldeablaze", "tauros-paldea-blaze-breed"],
        "tauros-paldea-combat": ["tauros-paldeacombat", "tauros-paldea-combat-breed"],
        "darmanitan-galar-zen": ["darmanitan-galarzen"],
        "toxtricity-low-key": ["toxtricity-lowkey"],
        "urshifu-rapid-strike": ["urshifu-rapidstrike"],
        "urshifu-single-strike": ["urshifu-singlestrike"],
        "dudunsparce-three-segment": ["dudunsparce-threesegment"],
        "dudunsparce-two-segment": ["dudunsparce-twosegment"]
      };

      function pokemonSlugs(name) {
        const normalized = normalizePokemonName(name).toLowerCase();
        if (!normalized) return [];
        const hyphenSlug = normalized
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "");
        const compactSlug = normalized.replace(/[^a-z0-9]+/g, "");
        const patternAliases = [
          hyphenSlug.replace(/-(blue|white)-striped$/u, "-$1striped"),
          hyphenSlug.replace(/-paldea-(aqua|blaze|combat)$/u, "-paldea$1"),
          hyphenSlug.replace(/-(rapid|single)-strike$/u, "-$1strike"),
          hyphenSlug.replace(/-low-key$/u, "-lowkey"),
          hyphenSlug.replace(/-(two|three|four)-segment$/u, "-$1segment")
        ];
        return uniqueList([
          hyphenSlug,
          ...(SPRITE_SLUG_ALIASES[hyphenSlug] || []),
          ...patternAliases,
          compactSlug
        ]);
      }

      function spriteCandidates(species) {
        return pokemonSlugs(species?.name)
          .map((slug) => `${LOCAL_SPRITE_BASE_URL}/${slug}.png`);
      }

      function spriteUrl(species) {
        return spriteCandidates(species)[0] || "";
      }

      function setSprite(image, fallback, species) {
        const name = species?.name || "Pokémon";
        const candidates = spriteCandidates(species);
        let index = 0;
        image.alt = `${name} sprite`;
        fallback.textContent = name.slice(0, 1).toUpperCase();
        image.hidden = true;
        fallback.classList.add("is-visible");

        function tryNextSprite() {
          if (index >= candidates.length) {
            image.onload = null;
            image.onerror = null;
            image.removeAttribute("src");
            image.hidden = true;
            fallback.classList.add("is-visible");
            return;
          }
          image.onload = () => {
            image.hidden = false;
            fallback.classList.remove("is-visible");
          };
          image.onerror = () => {
            index += 1;
            tryNextSprite();
          };
          image.src = candidates[index];
        }

        tryNextSprite();
      }

      function lookupHeightWeight(name) {
        if (!name) return null;
        if (HW_MAP[name]) return HW_MAP[name];
        const base = String(name).split("-")[0];
        return HW_MAP[base] || null;
      }

      function shorten(text, limit = 220) {
        const clean = String(text || "").trim();
        return clean.length > limit ? `${clean.slice(0, limit - 1)}…` : clean;
      }

      /* ---- 博士的观察：P6 sealed copy display ---- */
      function buildConciseObservation(result) {
        return window.PokemonSoulCopywriter?.buildPokemonSoulExplanation(result) || null;
      }

      function safeExplanation(result) {
        const fallback = {
          title: "博士的观察",
          paragraphs: ["这次的观察记录还没有整理完整。先看看这位伙伴和它走过的进化路线。"],
          chips: []
        };
        try {
          const copy = window.PokemonSoulCopywriter.buildPokemonSoulExplanation(result);
          const visible = [copy.title, ...(copy.paragraphs || []), ...(copy.chips || [])].join("\n");
          const issues = window.PokemonSoulCopywriter.validateVisibleCopy(visible);
          if (issues.length) {
            console.warn("Copywriter output failed guard.", issues);
            return fallback;
          }
          return {
            title: shorten(copy.title, 60),
            paragraphs: (copy.paragraphs || []).slice(0, 4).map((paragraph) => shorten(paragraph, 240)),
            chips: (copy.chips || []).slice(0, 5)
          };
        } catch (error) {
          console.warn("Copywriter output fallback used.", error);
          return fallback;
        }
      }

      function typePillImg(type) {
        const img = document.createElement("img");
        img.src = TYPE_ICONS[type] || TYPE_ICONS.Normal;
        img.alt = TYPE_CN[type] || type;
        img.title = TYPE_CN[type] || type;
        return img;
      }

      function renderChain(result) {
        const container = document.getElementById("evolution-chain");
        container.replaceChildren();
        const chain = Array.isArray(result.chain) ? result.chain : [];
        chain.forEach((species, index) => {
          if (index > 0) {
            const arrow = document.createElement("img");
            arrow.className = "chain-arrow";
            arrow.src = DECO.chevron;
            arrow.alt = "";
            container.append(arrow);
          }
          const item = document.createElement("div");
          const current = species.name === result.selectedSpecies?.name || index + 1 === result.stageIndex;
          item.className = `chain-node${current ? " is-current" : ""}`;
          if (current) item.setAttribute("aria-current", "true");
          const image = document.createElement("img");
          image.className = "sprite";
          const fallback = document.createElement("span");
          fallback.className = "sprite-fallback";
          setSprite(image, fallback, species);
          const label = document.createElement("span");
          label.className = "chain-name";
          label.textContent = species.name;
          item.append(image, fallback, label);
          container.append(item);
        });
      }

      function renderResult(result) {
        if (!result?.selectedSpecies) throw new Error("selectedSpecies is missing");
        const species = result.selectedSpecies;
        const explanation = safeExplanation(result);
        document.getElementById("species-name").textContent = species.name;
        document.getElementById("stage-label").textContent =
          `当前阶段 ${result.stageIndex || species.stageIndex || 1} / ${result.chainStages || species.chainStages || 1}`;
        setSprite(document.getElementById("species-image"), document.getElementById("species-fallback"), species);

        const pills = document.getElementById("type-pills");
        pills.replaceChildren(...(species.types || result.typeCombo || []).map(typePillImg));

        const hw = lookupHeightWeight(species.name);
        document.getElementById("hw-height").textContent = hw ? `${hw[0]}m` : "—";
        document.getElementById("hw-weight").textContent = hw ? `${hw[1]}kg` : "—";

        document.getElementById("copy-title").textContent = explanation.title;
        const paragraphs = document.getElementById("copy-paragraphs");
        paragraphs.replaceChildren(...explanation.paragraphs.map((text) => {
          const paragraph = document.createElement("p");
          paragraph.textContent = text;
          return paragraph;
        }));
        const chips = document.getElementById("result-chips");
        chips.replaceChildren(...explanation.chips.map((text) => {
          const chip = document.createElement("span");
          chip.className = "chip";
          chip.textContent = text;
          return chip;
        }));
        renderChain(result);
        resultError.textContent = "";
        resultError.classList.remove("is-visible");
        resultContent.style.display = "contents";
