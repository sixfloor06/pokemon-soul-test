<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>宝可梦共鸣测试</title>
  <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
  <style>
    :root {
      color-scheme: light;
      --ink: #20312c;
      --muted: #687872;
      --line: #d7e3dc;
      --paper: #fffef9;
      --leaf: #2d7d55;
      --leaf-dark: #205e40;
      --sun: #f4c95d;
      --sky: #dff1f4;
      --danger: #b84949;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-width: 320px;
      min-height: 100svh;
      color: var(--ink);
      background: #eef6ed;
      font: 15px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    button, input, select { font: inherit; }
    button { cursor: pointer; }
    .app-shell {
      width: min(100%, 920px);
      min-height: 100svh;
      margin: 0 auto;
      background: var(--paper);
      border-inline: 1px solid var(--line);
    }
    .screen {
      display: none;
      min-height: 100svh;
      padding: 24px;
    }
    .screen.is-active { display: grid; }
    .input-screen {
      place-items: center;
      background: #f7fff8;
    }
    .input-layout { width: min(100%, 520px); }
    .brand-line {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      color: var(--leaf-dark);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }
    .pokeball {
      width: 28px;
      height: 28px;
      border: 3px solid var(--ink);
      border-radius: 50%;
      background: #e7615c;
      position: relative;
      flex: 0 0 auto;
      overflow: hidden;
    }
    .pokeball::before {
      content: "";
      position: absolute;
      inset: 43% 0 0;
      border-top: 4px solid var(--ink);
      background: #fff;
    }
    .pokeball::after {
      content: "";
      position: absolute;
      width: 7px;
      height: 7px;
      inset: 50% auto auto 50%;
      border: 2px solid var(--ink);
      border-radius: 50%;
      background: #fff;
      transform: translate(-50%, -50%);
    }
    h1, h2, p { margin-top: 0; }
    .input-screen h1 {
      max-width: 460px;
      margin-bottom: 28px;
      font-size: clamp(30px, 8vw, 48px);
      line-height: 1.18;
      letter-spacing: 0;
    }
    .input-form {
      display: grid;
      gap: 15px;
      padding-top: 22px;
      border-top: 2px solid var(--ink);
    }
    .field { display: grid; gap: 7px; }
    .field label { font-size: 13px; font-weight: 750; }
    .field input, .field select {
      width: 100%;
      min-height: 48px;
      padding: 10px 12px;
      color: var(--ink);
      background: #fff;
      border: 1px solid #adbbb3;
      border-radius: 6px;
      outline: none;
    }
    .field input:focus, .field select:focus {
      border-color: var(--leaf);
      box-shadow: 0 0 0 3px rgba(45, 125, 85, .14);
    }
    .primary-button, .secondary-button {
      min-height: 50px;
      padding: 11px 18px;
      border-radius: 6px;
      font-weight: 800;
    }
    .primary-button {
      color: #fff;
      background: var(--leaf);
      border: 1px solid var(--leaf-dark);
      box-shadow: 0 3px 0 var(--leaf-dark);
    }
    .primary-button:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--leaf-dark); }
    .primary-button:disabled { opacity: .65; cursor: wait; }
    .secondary-button {
      color: var(--leaf-dark);
      background: #fff;
      border: 1px solid var(--leaf);
    }
    .form-error {
      min-height: 22px;
      margin: 0;
      color: var(--danger);
      font-size: 13px;
      font-weight: 650;
    }
    .loading-screen {
      place-items: center;
      text-align: center;
      background: var(--sky);
    }
    .loading-cluster { width: min(100%, 360px); }
    .loading-ball { margin: 0 auto 20px; animation: bob 1.1s ease-in-out infinite; }
    .loading-screen h2 { margin-bottom: 8px; font-size: 24px; letter-spacing: 0; }
    .loading-dots { display: flex; justify-content: center; gap: 8px; margin-top: 24px; }
    .loading-dots span {
      width: 8px; height: 8px; border-radius: 50%; background: var(--leaf);
      animation: pulse 1s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: .15s; }
    .loading-dots span:nth-child(3) { animation-delay: .3s; }
    .result-screen {
      align-content: start;
      gap: 14px;
      padding: 16px;
      background: #fffef9;
    }
    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
    }
    .result-kicker { margin: 0; color: var(--leaf-dark); font-size: 12px; font-weight: 800; }
    .result-layout {
      display: grid;
      grid-template-columns: minmax(180px, .75fr) minmax(0, 1.25fr);
      gap: 18px;
      align-items: start;
    }
    .species-visual {
      display: grid;
      place-items: center;
      min-height: 250px;
      background: #edf7ef;
      border: 1px solid var(--line);
      border-radius: 8px;
      position: relative;
      overflow: hidden;
    }
    .species-visual img {
      width: min(100%, 240px);
      aspect-ratio: 1;
      object-fit: contain;
      image-rendering: pixelated;
    }
    .sprite-fallback {
      display: none;
      place-items: center;
      width: 116px;
      height: 116px;
      border: 3px solid var(--ink);
      border-radius: 50%;
      color: var(--ink);
      background: #fff;
      font-size: 42px;
      font-weight: 900;
    }
    .sprite-fallback.is-visible { display: grid; }
    .species-meta h2 {
      margin-bottom: 5px;
      overflow-wrap: anywhere;
      font-size: clamp(27px, 6vw, 42px);
      line-height: 1.08;
      letter-spacing: 0;
    }
    .stage-label { margin-bottom: 10px; color: var(--muted); font-size: 13px; }
    .badges, .chips { display: flex; flex-wrap: wrap; gap: 7px; }
    .type-badge, .chip {
      padding: 4px 9px;
      border: 1px solid rgba(32, 49, 44, .22);
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
    }
    .chip { color: var(--leaf-dark); background: #eef7f1; }
    .explanation {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }
    .explanation h3 { margin: 0 0 8px; font-size: 16px; letter-spacing: 0; }
    .explanation p { margin-bottom: 7px; color: #45544e; font-size: 13px; line-height: 1.55; }
    .chain-block { min-width: 0; }
    .section-label { margin: 0 0 7px; color: var(--muted); font-size: 12px; font-weight: 800; }
    .chain-list {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 2px 8px;
      scrollbar-width: thin;
    }
    .chain-node {
      flex: 0 0 94px;
      min-width: 94px;
      padding: 6px;
      text-align: center;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 6px;
    }
    .chain-node.is-current {
      background: #eff9ef;
      border: 2px solid var(--leaf);
    }
    .chain-image-wrap {
      display: grid;
      place-items: center;
      width: 60px;
      height: 60px;
      margin: 0 auto 3px;
    }
    .chain-node img { width: 60px; height: 60px; object-fit: contain; image-rendering: pixelated; }
    .chain-node .sprite-fallback { width: 44px; height: 44px; border-width: 2px; font-size: 17px; }
    .chain-name { overflow-wrap: anywhere; font-size: 10px; font-weight: 750; line-height: 1.2; }
    .result-actions { display: flex; justify-content: center; }
    .result-actions .secondary-button { width: min(100%, 260px); }
    .error-panel {
      display: none;
      padding: 12px;
      color: #783737;
      background: #fff3f1;
      border: 1px solid #e4b8b2;
      border-radius: 6px;
      text-align: center;
    }
    .error-panel.is-visible { display: block; }
    .dev-tools {
      margin: 12px 16px 24px;
      color: var(--muted);
      font-size: 12px;
    }
    .dev-tools summary { cursor: pointer; }
    .dev-tools button { margin-top: 8px; padding: 6px 10px; }
    .dev-tools pre {
      max-height: 240px;
      padding: 10px;
      overflow: auto;
      background: #f4f6f4;
      border: 1px solid var(--line);
      white-space: pre-wrap;
    }
    @keyframes bob { 50% { transform: translateY(-7px); } }
    @keyframes pulse { 50% { opacity: .3; transform: scale(.75); } }
    @media (max-width: 640px) {
      .screen { padding: 18px; }
      .result-screen { padding: 10px 12px 12px; gap: 9px; }
      .result-header { padding-bottom: 7px; }
      .result-layout { grid-template-columns: 118px minmax(0, 1fr); gap: 11px; }
      .species-visual { min-height: 174px; }
      .species-visual img { width: 150px; }
      .species-meta h2 { font-size: 26px; }
      .explanation { margin-top: 10px; padding-top: 9px; }
      .explanation p { font-size: 12px; line-height: 1.45; }
      .chain-node { flex-basis: 82px; min-width: 82px; }
      .chain-name { font-size: 9px; }
    }
    @media (max-width: 370px) {
      .result-layout { grid-template-columns: 100px minmax(0, 1fr); }
      .species-visual { min-height: 150px; }
      .species-visual img { width: 128px; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <section id="screen-input" class="screen input-screen is-active" aria-labelledby="input-title">
      <div class="input-layout">
        <div class="brand-line"><span class="pokeball" aria-hidden="true"></span><span>Pokémon Soul</span></div>
        <h1 id="input-title">输入生日，寻找与你共鸣的宝可梦吧</h1>
        <form id="resonance-form" class="input-form" novalidate>
          <div class="field">
            <label for="birth-date">出生日期</label>
            <input id="birth-date" name="birth-date" type="date" required>
          </div>
          <div class="field">
            <label for="birth-hour">出生时辰</label>
            <select id="birth-hour" name="birth-hour">
              <option value="12">未知 / 默认正午</option>
              <option value="23">子时 · 23:00</option>
              <option value="1">丑时 · 01:00</option>
              <option value="3">寅时 · 03:00</option>
              <option value="5">卯时 · 05:00</option>
              <option value="7">辰时 · 07:00</option>
              <option value="9">巳时 · 09:00</option>
              <option value="11">午时 · 11:00</option>
              <option value="13">未时 · 13:00</option>
              <option value="15">申时 · 15:00</option>
              <option value="17">酉时 · 17:00</option>
              <option value="19">戌时 · 19:00</option>
              <option value="21">亥时 · 21:00</option>
            </select>
          </div>
          <div class="field">
            <label for="birth-timezone">出生时区</label>
            <select id="birth-timezone" name="birth-timezone" required>
              <option value="-480">UTC-8 · 北美太平洋时间</option>
              <option value="-300">UTC-5 · 北美东部时间</option>
              <option value="0">UTC+0 · 英国 / UTC</option>
              <option value="60">UTC+1 · 欧洲中部</option>
              <option value="480" selected>UTC+8 · 北京时间 / 中国标准时间</option>
              <option value="540">UTC+9 · 日本 / 韩国</option>
              <option value="600">UTC+10 · 澳大利亚东部</option>
            </select>
          </div>
          <p id="form-error" class="form-error" role="alert" aria-live="polite"></p>
          <button id="start-resonance" class="primary-button" type="submit">开始共鸣</button>
        </form>
      </div>
    </section>

    <section id="screen-loading" class="screen loading-screen" aria-labelledby="loading-title" aria-live="polite">
      <div class="loading-cluster">
        <span class="pokeball loading-ball" aria-hidden="true"></span>
        <h2 id="loading-title">正在寻找与你共鸣的宝可梦……</h2>
        <div class="loading-dots" aria-hidden="true"><span></span><span></span><span></span></div>
      </div>
    </section>

    <section id="screen-result" class="screen result-screen" aria-labelledby="species-name">
      <header class="result-header">
        <p class="result-kicker">你的共鸣伙伴</p>
        <div id="result-chips" class="chips" aria-label="共鸣标签"></div>
      </header>
      <div id="result-error" class="error-panel" role="alert"></div>
      <div id="result-content">
        <div class="result-layout">
          <div class="species-visual">
            <img id="species-image" alt="">
            <span id="species-fallback" class="sprite-fallback" aria-hidden="true"></span>
          </div>
          <div class="species-meta">
            <h2 id="species-name"></h2>
            <p id="stage-label" class="stage-label"></p>
            <div id="type-badges" class="badges" aria-label="宝可梦属性"></div>
            <div class="explanation">
              <h3 id="copy-title"></h3>
              <div id="copy-paragraphs"></div>
            </div>
          </div>
        </div>
        <div class="chain-block">
          <p class="section-label">进化路线</p>
          <div id="evolution-chain" class="chain-list" aria-label="完整进化路线"></div>
        </div>
      </div>
      <div class="result-actions">
        <button id="restart-resonance" class="secondary-button" type="button">重新共鸣</button>
      </div>
    </section>

    <details class="dev-tools">
      <summary>开发测试</summary>
      <button id="run-tests" type="button">运行 Algorithm 自测</button>
      <button id="run-copy-tests" type="button">运行 Copywriter 自测</button>
      <button id="run-frontend-tests" type="button">运行 Frontend 自测</button>
      <pre id="test-output" aria-live="polite">Ready.</pre>
    </details>
  </main>

  <script>
    (() => {
      "use strict";

      const POKEDEX_URL = "data/pokedex.json";
      const LEGENDARY_QUALITY_THRESHOLD = 0.88;
      const UTC8_OFFSET_MINUTES = 480;
      const MIN_TIMEZONE_OFFSET_MINUTES = -720;
      const MAX_TIMEZONE_OFFSET_MINUTES = 840;
      const MINUTE_MS = 60 * 1000;
      const ELEMENTS = ["Wood", "Fire", "Earth", "Metal", "Water"];
      const STAT_PRIORITY = ["spa", "atk", "spe", "def", "spd", "hp"];
      const TEN_GOD_TO_STAT = {
        "食伤": "spa",
        "财": "atk",
        "比劫": "spe",
        "官杀": "def",
        "印": "spd"
      };
      const DOMAIN_MAP = {
        Wood: ["Grass", "Flying", "Fairy", "Bug"],
        Fire: ["Fire", "Psychic", "Electric", "Ghost"],
        Earth: ["Normal", "Rock", "Ground"],
        Metal: ["Steel", "Fighting", "Poison", "Ice"],
        Water: ["Dark", "Water", "Dragon"]
      };
      const TYPE_AFFINITY = {
        Grass: "印", Flying: "食伤", Fairy: "官杀", Bug: "财",
        Fire: "印", Psychic: "食伤", Electric: "财", Ghost: "官杀",
        Normal: "比劫", Rock: "印", Ground: "食伤",
        Steel: "印", Fighting: "食伤", Poison: "财", Ice: "官杀",
        Dark: "财", Water: "食伤", Dragon: "印"
      };
      const P5_ROLE_MARGIN = 0.08;
      const P5_LOTTERY_BETA = 1.0;
      const P5_SUB_LOTTERY_BETA = 0;
      const P5_SUB_DECISION_MODE = "two-zone-no-signal";
      const P5_ROLE_WEIGHT_HOME = 0.70;
      const P5_ROLE_WEIGHT_ADJACENT = 0.20;
      const P5_ROLE_WEIGHT_OTHER = 0.10;
      const P5_ALPHA_STATUS = "retired-fixed-sharp";
      const POOL_PRIMARY_SHARE_SOURCE = "pokedex.json ordinary final forms; computed at runtime from non-legendary final stage entries by types[0]";

      function roleElement(pivotElement, role) {
        if (role === "比劫") return pivotElement;
        if (role === "食伤") return nextElement(pivotElement);
        if (role === "财") return controls(pivotElement);
        if (role === "官杀") return controlledBy(pivotElement);
        return previousElement(pivotElement);
      }

      function domainElementForType(type) {
        return ELEMENTS.find((element) => DOMAIN_MAP[element].includes(type)) || null;
      }

      function projectionRowSum(pivotElement) {
        const size = DOMAIN_MAP[pivotElement]?.length || 4;
        return size === 3 ? 0.9 : 1.2;
      }

      function projectionFeatureWeights(pivotElement, role) {
        const domain = DOMAIN_MAP[pivotElement] || [];
        const sourceElement = roleElement(pivotElement, role);
        const groups = { home: [], adjacent: [], other: [] };
        domain.forEach((type) => {
          const homeRole = TYPE_AFFINITY[type];
          const homeElement = roleElement(pivotElement, homeRole);
          if (homeRole === role) groups.home.push(type);
          else if (homeElement === nextElement(sourceElement) || homeElement === previousElement(sourceElement)) groups.adjacent.push(type);
          else groups.other.push(type);
        });
        const intendedMass = { home: P5_ROLE_WEIGHT_HOME, adjacent: P5_ROLE_WEIGHT_ADJACENT, other: P5_ROLE_WEIGHT_OTHER };
        const activeGroups = Object.keys(groups).filter((key) => groups[key].length);
        const activeMass = activeGroups.reduce((sum, key) => sum + intendedMass[key], 0) || 1;
        const weights = Object.fromEntries(domain.map((type) => [type, 0]));
        activeGroups.forEach((key) => {
          const mass = intendedMass[key] / activeMass;
          groups[key].forEach((type) => { weights[type] = mass / groups[key].length; });
        });
        return weights;
      }

      function buildRoleTypeProjection() {
        const projection = {};
        ELEMENTS.forEach((pivotElement) => {
          const domain = DOMAIN_MAP[pivotElement];
          const rowSum = projectionRowSum(pivotElement);
          projection[pivotElement] = {};
          ["比劫", "印", "食伤", "财", "官杀"].forEach((role) => {
            const featureWeights = projectionFeatureWeights(pivotElement, role);
            projection[pivotElement][role] = Object.fromEntries(domain.map((type) => [
              type,
              round(rowSum * (featureWeights[type] || 0))
            ]));
          });
        });
        return projection;
      }

      const ROLE_TYPE_PROJECTION = buildRoleTypeProjection();

      const ALGORITHM_VERSION = "v7.0-d031-release";
      const SPECIFIC_BAZI_MATCH_OVERRIDES = Object.freeze({});
      const FIXED_REGRESSION_SNAPSHOT_CASES = Object.freeze([
        {
          id: "D0312-SNAPSHOT-GHOST-DARK",
          seed: "丙子庚子丁未癸卯",
          note: "Runtime override removed in D-031.2; snapshot current natural result instead of rewriting it."
        },
        {
          id: "D0312-SNAPSHOT-ELECTRIC",
          seed: "丁丑丙午丁未庚子",
          note: "Runtime override removed in D-031.2; snapshot current natural result instead of rewriting it."
        }
      ]);

      function baziMatchOverride(seed, targetTypes) {
        return null;
      }

      function applyForcedTypeComboOverride(seed, candidatesToTry) {
        return candidatesToTry;
      }

      function matchOverridePriority(seed, targetTypes, chain, final) {
        return 0;
      }

      const STEM_TO_WUXING = {
        "甲": "Wood", "乙": "Wood", "丙": "Fire", "丁": "Fire", "戊": "Earth",
        "己": "Earth", "庚": "Metal", "辛": "Metal", "壬": "Water", "癸": "Water"
      };
      const BRANCH_HIDDEN_STEMS = {
        "子": ["癸"], "丑": ["己", "癸", "辛"], "寅": ["甲", "丙", "戊"],
        "卯": ["乙"], "辰": ["戊", "乙", "癸"], "巳": ["丙", "戊", "庚"],
        "午": ["丁", "己"], "未": ["己", "丁", "乙"], "申": ["庚", "壬", "戊"],
        "酉": ["辛"], "戌": ["戊", "辛", "丁"], "亥": ["壬", "甲"]
      };
      const HIDDEN_WEIGHTS = [0.6, 0.25, 0.15];
      function calculateHiddenStemSupplyTotals() {
        const totals = emptyElements();
        Object.values(BRANCH_HIDDEN_STEMS).forEach((stems) => {
          stems.forEach((stem, hiddenIndex) => {
            const element = STEM_TO_WUXING[stem];
            if (element) totals[element] += HIDDEN_WEIGHTS[hiddenIndex] || 0;
          });
        });
        return Object.fromEntries(Object.entries(totals).map(([element, value]) => [element, round(value)]));
      }

      function calculateHiddenStemSupplyNormalization() {
        const totals = calculateHiddenStemSupplyTotals();
        const average = Object.values(totals).reduce((sum, value) => sum + value, 0) / ELEMENTS.length;
        return Object.fromEntries(ELEMENTS.map((element) => [
          element,
          totals[element] ? round(average / totals[element]) : 1
        ]));
      }

      const HIDDEN_STEM_SUPPLY_TOTALS = calculateHiddenStemSupplyTotals();
      const HIDDEN_STEM_SUPPLY_NORMALIZATION = calculateHiddenStemSupplyNormalization();
      const SECONDARY_SOURCE_ELEMENT_FACTOR = HIDDEN_STEM_SUPPLY_NORMALIZATION;
      const SEASON_BY_BRANCH = {
        "寅": "Spring", "卯": "Spring", "辰": "Spring",
        "巳": "Summer", "午": "Summer", "未": "Summer",
        "申": "Autumn", "酉": "Autumn", "戌": "Autumn",
        "亥": "Winter", "子": "Winter", "丑": "Winter"
      };
      const SEASON_STATES = {
        Spring: { Wood: "旺", Fire: "相", Water: "休", Metal: "囚", Earth: "死" },
        Summer: { Fire: "旺", Earth: "相", Wood: "休", Water: "囚", Metal: "死" },
        Autumn: { Metal: "旺", Water: "相", Earth: "休", Fire: "囚", Wood: "死" },
        Winter: { Water: "旺", Wood: "相", Metal: "休", Earth: "囚", Fire: "死" }
      };
      const SEASON_COEFFICIENTS = { "旺": 0.35, "相": 0.20, "休": -0.10, "囚": -0.20, "死": -0.30 };
      const CLASH_PAIRS = new Set(["子午", "午子", "丑未", "未丑", "寅申", "申寅", "卯酉", "酉卯", "辰戌", "戌辰", "巳亥", "亥巳"]);
      const FORBIDDEN_VISIBLE_TERMS = ["八字", "五行", "十神", "用神", "身强", "身弱", "命格"];

      let pokedexCache = null;
      let pokedexPromise = null;

      function friendlyError(message) {
        const error = new Error(message);
        error.name = "PokemonSoulAlgorithmError";
        return error;
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function round(value, digits = 6) {
        const factor = 10 ** digits;
        return Math.round(value * factor) / factor;
      }

      function fnv1a(text) {
        let hash = 0x811c9dc5;
        for (let index = 0; index < text.length; index += 1) {
          hash ^= text.charCodeAt(index);
          hash = Math.imul(hash, 0x01000193);
        }
        return hash >>> 0;
      }

      function stableFraction(seed, purpose) {
        return fnv1a(`${seed}|${purpose}`) / 0xffffffff;
      }

      function stableSort(items, scoreFn, seed, purpose, descending = true) {
        return [...items].sort((left, right) => {
          const delta = scoreFn(left) - scoreFn(right);
          if (Math.abs(delta) > 1e-12) return descending ? -delta : delta;
          return fnv1a(`${seed}|${purpose}|${String(left)}`) - fnv1a(`${seed}|${purpose}|${String(right)}`);
        });
      }

      function emptyElements() {
        return Object.fromEntries(ELEMENTS.map((element) => [element, 0]));
      }

      function normalizeMap(values) {
        const total = Object.values(values).reduce((sum, value) => sum + value, 0);
        return Object.fromEntries(Object.entries(values).map(([key, value]) => [key, total ? round(value / total) : 0]));
      }

      function nextElement(element) {
        return ELEMENTS[(ELEMENTS.indexOf(element) + 1) % ELEMENTS.length];
      }

      function previousElement(element) {
        return ELEMENTS[(ELEMENTS.indexOf(element) + ELEMENTS.length - 1) % ELEMENTS.length];
      }

      function controlledBy(element) {
        return { Wood: "Metal", Fire: "Water", Earth: "Wood", Metal: "Fire", Water: "Earth" }[element];
      }

      function controls(element) {
        return { Wood: "Earth", Fire: "Metal", Earth: "Water", Metal: "Wood", Water: "Fire" }[element];
      }

      function relationToTenGod(dmWx, otherWx) {
        if (otherWx === dmWx) return "比劫";
        if (otherWx === nextElement(dmWx)) return "食伤";
        if (otherWx === controls(dmWx)) return "财";
        if (otherWx === controlledBy(dmWx)) return "官杀";
        return "印";
      }

      function parsePillar(pillar) {
        if (typeof pillar !== "string" || pillar.length < 2) throw friendlyError("Calendar result is incomplete.");
        return { stem: pillar[0], branch: pillar[1] };
      }

      function wallTimeUtcMs(parts) {
        const date = new Date(0);
        date.setUTCFullYear(parts.year, parts.month - 1, parts.day);
        date.setUTCHours(parts.hour, 0, 0, 0);
        return date.getTime();
      }

      function utcParts(timestamp) {
        const date = new Date(timestamp);
        return {
          year: date.getUTCFullYear(),
          month: date.getUTCMonth() + 1,
          day: date.getUTCDate(),
          hour: date.getUTCHours()
        };
      }

      function normalizeToUtc8(original) {
        const originalWallTimeMs = wallTimeUtcMs(original);
        const birthInstantUtcMs = originalWallTimeMs - original.timezoneOffsetMinutes * MINUTE_MS;
        const normalizedToUtc8 = utcParts(birthInstantUtcMs + UTC8_OFFSET_MINUTES * MINUTE_MS);
        return { birthInstantUtcMs, normalizedToUtc8 };
      }

      function validateInput(input) {
        if (!input || typeof input !== "object") throw friendlyError("Please provide a valid birth date.");
        const original = {
          year: Number(input.year),
          month: Number(input.month),
          day: Number(input.day),
          hour: input.hour === undefined || input.hour === null || input.hour === "" ? 12 : Number(input.hour),
          timezoneOffsetMinutes: input.timezoneOffsetMinutes === undefined || input.timezoneOffsetMinutes === null || input.timezoneOffsetMinutes === ""
            ? UTC8_OFFSET_MINUTES
            : Number(input.timezoneOffsetMinutes)
        };
        const currentYear = input.currentYear === undefined ? new Date().getFullYear() : Number(input.currentYear);
        const integers = ["year", "month", "day", "hour", "timezoneOffsetMinutes"];
        if (integers.some((key) => !Number.isInteger(original[key])) || !Number.isInteger(currentYear)) {
          throw friendlyError("Please provide a valid birth date.");
        }
        if (original.hour < 0 || original.hour > 23) throw friendlyError("Please provide an hour between 0 and 23.");
        if (
          original.timezoneOffsetMinutes < MIN_TIMEZONE_OFFSET_MINUTES ||
          original.timezoneOffsetMinutes > MAX_TIMEZONE_OFFSET_MINUTES
        ) throw friendlyError("Please provide a valid timezone.");
        const wallTimeMs = wallTimeUtcMs(original);
        const wallTime = utcParts(wallTimeMs);
        if (
          wallTime.year !== original.year ||
          wallTime.month !== original.month ||
          wallTime.day !== original.day ||
          wallTime.hour !== original.hour
        ) throw friendlyError("Please provide a valid birth date.");
        const conversion = normalizeToUtc8(original);
        if (conversion.birthInstantUtcMs > Date.now()) throw friendlyError("Birth date cannot be in the future.");
        return {
          original,
          normalizedToUtc8: conversion.normalizedToUtc8,
          currentYear
        };
      }

      function validatePokedex(data) {
        if (!Array.isArray(data) || !data.length) throw friendlyError("Pokemon data is unavailable.");
        const required = ["num", "name", "types", "baseStats", "evos", "prevo", "chainId", "stageIndex", "chainStages", "finalForms", "finalTypeCombo", "isLegendary"];
        const invalid = data.find((entry) => required.some((key) => !(key in entry)));
        if (invalid) throw friendlyError(`Pokemon data is incomplete near ${invalid.name || "an unknown entry"}.`);
        return data;
      }

      async function loadPokedex() {
        if (pokedexCache) return pokedexCache;
        if (!pokedexPromise) {
          pokedexPromise = fetch(POKEDEX_URL)
            .then((response) => {
              if (!response.ok) throw friendlyError("Pokemon data could not be loaded.");
              return response.json();
            })
            .then(validatePokedex)
            .then((data) => {
              pokedexCache = data;
              return data;
            })
            .catch((error) => {
              pokedexPromise = null;
              if (error.name === "PokemonSoulAlgorithmError") throw error;
              throw friendlyError("Pokemon data could not be loaded.");
            });
        }
        return pokedexPromise;
      }

      function getBazi(input) {
        if (!window.Solar || typeof window.Solar.fromYmdHms !== "function") {
          throw friendlyError("Calendar service is unavailable. Please try again later.");
        }
        try {
          return window.Solar.fromYmdHms(input.year, input.month, input.day, input.hour, 0, 0).getLunar().getBaZi();
        } catch (error) {
          throw friendlyError("The birth date could not be calculated.");
        }
      }

      function calculateShares(parsedPillars) {
        const totals = emptyElements();
        parsedPillars.forEach((pillar, pillarIndex) => {
          totals[STEM_TO_WUXING[pillar.stem]] += 1;
          const monthMultiplier = pillarIndex === 1 ? 1.5 : 1;
          (BRANCH_HIDDEN_STEMS[pillar.branch] || []).forEach((stem, hiddenIndex) => {
            totals[STEM_TO_WUXING[stem]] += (HIDDEN_WEIGHTS[hiddenIndex] || 0) * monthMultiplier;
          });
        });
        return normalizeMap(totals);
      }

      function calculateStructure(parsedPillars, dmWx) {
        const totals = { "比劫": 0, "食伤": 0, "财": 0, "官杀": 0, "印": 0 };
        parsedPillars.forEach((pillar, pillarIndex) => {
          const pillarMultiplier = pillarIndex === 1 ? 1.5 : 1;
          totals[relationToTenGod(dmWx, STEM_TO_WUXING[pillar.stem])] += pillarMultiplier;
          (BRANCH_HIDDEN_STEMS[pillar.branch] || []).forEach((stem, hiddenIndex) => {
            totals[relationToTenGod(dmWx, STEM_TO_WUXING[stem])] += (HIDDEN_WEIGHTS[hiddenIndex] || 0) * pillarMultiplier;
          });
        });
        return normalizeMap(totals);
      }

      function calculateStrength(shares, dmWx, monthBranch) {
        const peer = shares[dmWx];
        const resource = shares[previousElement(dmWx)];
        const output = shares[nextElement(dmWx)];
        const wealth = shares[controls(dmWx)];
        const power = shares[controlledBy(dmWx)];
        const base = (peer + 0.8 * resource) - (0.9 * power + 0.6 * wealth + 0.4 * output);
        const season = SEASON_BY_BRANCH[monthBranch];
        const state = SEASON_STATES[season][dmWx];
        const coefficient = SEASON_COEFFICIENTS[state];
        const strength = round(base + coefficient);
        const strengthLabel = strength > 0.18 ? "strong" : strength < -0.18 ? "weak" : "balanced";
        return { strength, strengthLabel, season, seasonState: state, seasonCoefficient: coefficient };
      }

      function chooseUseful(shares, dmWx, strengthLabel, seed) {
        let candidates;
        if (strengthLabel === "weak") candidates = [previousElement(dmWx), dmWx];
        else if (strengthLabel === "strong") candidates = [controlledBy(dmWx), nextElement(dmWx), controls(dmWx)];
        else {
          candidates = ELEMENTS.filter((element) => shares[element] > 0);
          if (!candidates.length) candidates = ELEMENTS;
        }
        return stableSort(candidates, (element) => shares[element], seed, "useful", true)[0];
      }

      function pickGate(dmWx, strength, structure, shares, useful) {
        const domain = DOMAIN_MAP[dmWx];
        const strengthLabel = strength > 0.18 ? "strong" : strength < -0.18 ? "weak" : "balanced";
        if (strengthLabel === "balanced") return [...domain];

        const preferredAffinities = strengthLabel === "strong"
          ? new Set(["财", "食伤", "比劫"])
          : new Set(["印", "官杀"]);
        let gate = domain.filter((type) => preferredAffinities.has(TYPE_AFFINITY[type]));

        const pressure = structure["官杀"] || 0;
        if (strengthLabel === "weak" && pressure > 0.28) {
          const supported = gate.filter((type) => TYPE_AFFINITY[type] === "印" || DOMAIN_MAP[useful].includes(type));
          if (supported.length) gate = supported;
        }
        if (strengthLabel === "strong" && shares[dmWx] > 0.32) {
          const expressive = gate.filter((type) => TYPE_AFFINITY[type] === "食伤" || TYPE_AFFINITY[type] === "财");
          if (expressive.length) gate = expressive;
        }
        return gate.length ? gate : [...domain];
      }

      function emptyTypeScores() {
        return Object.fromEntries(Object.values(DOMAIN_MAP).flat().map((type) => [type, 0]));
      }

      function addProjectionScores(scores, pivotElement, sourceElement, amount, factor = 1) {
        if (!pivotElement || !sourceElement || !amount) return;
        const role = relationToTenGod(pivotElement, sourceElement);
        const row = ROLE_TYPE_PROJECTION[pivotElement]?.[role] || {};
        Object.entries(row).forEach(([type, weight]) => {
          scores[type] = round((scores[type] || 0) + amount * factor * weight);
        });
      }

      function normalizeTypeScores(scores) {
        const total = Object.values(scores).reduce((sum, value) => sum + Math.max(0, value), 0);
        if (!total) return Object.fromEntries(Object.keys(scores).map((type) => [type, 0]));
        return Object.fromEntries(Object.entries(scores).map(([type, value]) => [type, round(Math.max(0, value) / total)]));
      }

      function mainElementWeights(parsedPillars) {
        const weights = emptyElements();
        parsedPillars.forEach((pillar, pillarIndex) => {
          if (pillarIndex !== 2) weights[STEM_TO_WUXING[pillar.stem]] += 1;
          (BRANCH_HIDDEN_STEMS[pillar.branch] || []).forEach((stem, hiddenIndex) => {
            const element = STEM_TO_WUXING[stem];
            weights[element] += (HIDDEN_WEIGHTS[hiddenIndex] || 0) * (HIDDEN_STEM_SUPPLY_NORMALIZATION[element] ?? 1);
          });
        });
        return Object.fromEntries(Object.entries(weights).map(([element, value]) => [element, round(value)]));
      }

      function hiddenElementWeights(parsedPillars) {
        const weights = emptyElements();
        parsedPillars.forEach((pillar) => {
          (BRANCH_HIDDEN_STEMS[pillar.branch] || []).forEach((stem, hiddenIndex) => {
            weights[STEM_TO_WUXING[stem]] += HIDDEN_WEIGHTS[hiddenIndex] || 0;
          });
        });
        return Object.fromEntries(Object.entries(weights).map(([element, value]) => [element, round(value)]));
      }

      let poolPrimaryShareCache = null;
      function calculatePoolPrimaryShare(pokedex) {
        if (poolPrimaryShareCache && poolPrimaryShareCache.pokedex === pokedex) return poolPrimaryShareCache.share;
        const counts = Object.fromEntries(Object.values(DOMAIN_MAP).flat().map((type) => [type, 0]));
        let total = 0;
        pokedex.forEach((entry) => {
          if (entry.isLegendary) return;
          if (entry.stageIndex !== entry.chainStages) return;
          const primary = entry.types?.[0];
          if (!(primary in counts)) return;
          counts[primary] += 1;
          total += 1;
        });
        const share = Object.fromEntries(Object.entries(counts).map(([type, count]) => [type, total ? round(count / total) : 0]));
        poolPrimaryShareCache = { pokedex, share, counts, total };
        return share;
      }

      function monthHiddenElements(parsedPillars) {
        const monthBranch = parsedPillars?.[1]?.branch;
        return new Set((BRANCH_HIDDEN_STEMS[monthBranch] || []).map((stem) => STEM_TO_WUXING[stem]).filter(Boolean));
      }

      function roleInfluenceScores(pivotElement, sourceWeights) {
        const scores = { "比劫": 0, "食伤": 0, "财": 0, "官杀": 0, "印": 0 };
        ELEMENTS.forEach((sourceElement) => {
          const role = relationToTenGod(pivotElement, sourceElement);
          scores[role] = round((scores[role] || 0) + (sourceWeights[sourceElement] || 0));
        });
        return scores;
      }

      function normalizeRoleScores(scores) {
        const total = Object.values(scores).reduce((sum, value) => sum + Math.max(0, value), 0);
        if (!total) return Object.fromEntries(Object.keys(scores).map((role) => [role, 0]));
        return Object.fromEntries(Object.entries(scores).map(([role, value]) => [role, round(Math.max(0, value) / total)]));
      }

      function roleDecisionFromScores(roleScores, seed, purpose, parsedPillars, pivotElement) {
        const normalizedRoles = normalizeRoleScores(roleScores);
        const roles = Object.keys(normalizedRoles);
        const rankedRoles = stableSort(roles, (role) => normalizedRoles[role] || 0, seed, `${purpose}|role-score`);
        const topRole = rankedRoles[0] || null;
        const secondRole = rankedRoles[1] || null;
        const topRoleScore = topRole ? normalizedRoles[topRole] || 0 : 0;
        const secondRoleScore = secondRole ? normalizedRoles[secondRole] || 0 : 0;
        const roleMargin = secondRole ? round(topRoleScore - secondRoleScore) : 1;
        const nearRoles = rankedRoles.filter((role) => topRoleScore - (normalizedRoles[role] || 0) <= P5_ROLE_MARGIN + 1e-12);
        if (!secondRole || roleMargin >= P5_ROLE_MARGIN) {
          return {
            zone: "decisive",
            path: "role-margin",
            topRole,
            secondRole,
            topRoleScore: round(topRoleScore),
            secondRoleScore: round(secondRoleScore),
            roleMargin,
            nearRoles,
            signalRoles: [],
            normalizedRoles,
            roleMarginThreshold: P5_ROLE_MARGIN,
            pivotElement
          };
        }
        const monthElements = monthHiddenElements(parsedPillars);
        const signalRoles = nearRoles.filter((role) => monthElements.has(roleElement(pivotElement, role)));
        if (signalRoles.length) {
          const selectedRole = stableSort(signalRoles, (role) => normalizedRoles[role] || 0, seed, `${purpose}|role-signal`)[0];
          return {
            zone: "signal",
            path: "month-hidden-role-element",
            topRole,
            secondRole,
            topRoleScore: round(topRoleScore),
            secondRoleScore: round(secondRoleScore),
            roleMargin,
            nearRoles,
            selectedRole,
            signalRoles,
            normalizedRoles,
            roleMarginThreshold: P5_ROLE_MARGIN,
            pivotElement
          };
        }
        return {
          zone: "lottery",
          path: "role-near-tie",
          topRole,
          secondRole,
          topRoleScore: round(topRoleScore),
          secondRoleScore: round(secondRoleScore),
          roleMargin,
          nearRoles,
          signalRoles: [],
          normalizedRoles,
          roleMarginThreshold: P5_ROLE_MARGIN,
          pivotElement
        };
      }

      function normalizedScoresForTypes(rawScores, candidateTypes) {
        const scoped = Object.fromEntries(candidateTypes.map((type) => [type, rawScores[type] || 0]));
        return normalizeTypeScores(scoped);
      }

      function typeHomeRole(type) {
        return TYPE_AFFINITY[type] || null;
      }

      function typeHomeElement(type, defaultPivotElement = null) {
        const pivotElement = domainElementForType(type) || defaultPivotElement;
        if (!pivotElement) return null;
        return roleElement(pivotElement, TYPE_AFFINITY[type]);
      }

      function weightedHashTypeChoice(types, poolPrimaryShare, seed, purpose, beta = P5_LOTTERY_BETA) {
        return [...types].sort((left, right) => {
          function raceScore(type) {
            const share = Math.max(poolPrimaryShare?.[type] || 0.000001, 0.000001);
            const weight = beta === 0 ? 1 : Math.pow(share, beta);
            const fraction = Math.max(stableFraction(seed, `${purpose}|lottery|${type}`), 1e-12);
            return -Math.log(fraction) / weight;
          }
          const delta = raceScore(left) - raceScore(right);
          return delta || fnv1a(`${seed}|${purpose}|lottery-tie|${left}`) - fnv1a(`${seed}|${purpose}|lottery-tie|${right}`);
        })[0] || types[0] || null;
      }

      function chooseTypeByRoleZone(rawScores, candidateTypes, roleScores, seed, purpose, parsedPillars, poolPrimaryShare, pivotElement, roleToTypePivotElement = pivotElement) {
        const usableTypes = [...new Set(candidateTypes)].filter((type) => (rawScores[type] || 0) > 0);
        const types = usableTypes.length ? usableTypes : [...new Set(candidateTypes)];
        const normalized = normalizedScoresForTypes(rawScores, types);
        const rankedTypes = stableSort(types, (type) => normalized[type] || 0, seed, `${purpose}|type-score`);
        const topType = rankedTypes[0] || null;
        const secondType = rankedTypes[1] || null;
        const topScore = topType ? normalized[topType] || 0 : 0;
        const secondScore = secondType ? normalized[secondType] || 0 : 0;
        const typeMargin = secondType ? round(topScore - secondScore) : 1;
        const roleDecision = roleDecisionFromScores(roleScores, seed, purpose, parsedPillars, pivotElement);
        let selectedType = topType;
        let lotteryCandidates = [];
        let lotteryWeights = null;
        if (roleDecision.zone === "signal") {
          const roleTypes = rankedTypes.filter((type) => typeHomeRole(type) === roleDecision.selectedRole);
          if (roleTypes.length) selectedType = roleTypes[0];
        } else if (roleDecision.zone === "lottery") {
          const nearRoleTypes = rankedTypes.filter((type) => roleDecision.nearRoles.includes(typeHomeRole(type)));
          lotteryCandidates = nearRoleTypes.length ? nearRoleTypes : rankedTypes.slice(0, Math.min(2, rankedTypes.length));
          selectedType = weightedHashTypeChoice(lotteryCandidates, poolPrimaryShare, seed, purpose);
          lotteryWeights = Object.fromEntries(lotteryCandidates.map((type) => {
            const share = Math.max(poolPrimaryShare?.[type] || 0.000001, 0.000001);
            return [type, round(P5_LOTTERY_BETA === 0 ? 1 : Math.pow(share, P5_LOTTERY_BETA))];
          }));
        }
        return {
          selectedType,
          zone: roleDecision.zone,
          path: roleDecision.path,
          topType,
          topScore: round(topScore),
          secondType,
          secondScore: round(secondScore),
          typeMargin,
          rankedTypes,
          lotteryCandidates,
          lotteryWeights,
          normalizedScores: normalized,
          roleDecision,
          beta: P5_LOTTERY_BETA,
          roleMarginThreshold: P5_ROLE_MARGIN,
          roleWeights: {
            home: P5_ROLE_WEIGHT_HOME,
            adjacent: P5_ROLE_WEIGHT_ADJACENT,
            other: P5_ROLE_WEIGHT_OTHER
          }
        };
      }

      function chooseTypeByRoleTwoZone(rawScores, candidateTypes, roleScores, seed, purpose, parsedPillars, poolPrimaryShare, pivotElement) {
        const usableTypes = [...new Set(candidateTypes)].filter((type) => (rawScores[type] || 0) > 0);
        const types = usableTypes.length ? usableTypes : [...new Set(candidateTypes)];
        const normalized = normalizedScoresForTypes(rawScores, types);
        const rankedTypes = stableSort(types, (type) => normalized[type] || 0, seed, `${purpose}|type-score`);
        const topType = rankedTypes[0] || null;
        const secondType = rankedTypes[1] || null;
        const topScore = topType ? normalized[topType] || 0 : 0;
        const secondScore = secondType ? normalized[secondType] || 0 : 0;
        const typeMargin = secondType ? round(topScore - secondScore) : 1;
        const normalizedRoles = normalizeRoleScores(roleScores);
        const roles = Object.keys(normalizedRoles);
        const rankedRoles = stableSort(roles, (role) => normalizedRoles[role] || 0, seed, `${purpose}|role-score`);
        const topRole = rankedRoles[0] || null;
        const secondRole = rankedRoles[1] || null;
        const topRoleScore = topRole ? normalizedRoles[topRole] || 0 : 0;
        const secondRoleScore = secondRole ? normalizedRoles[secondRole] || 0 : 0;
        const roleMargin = secondRole ? round(topRoleScore - secondRoleScore) : 1;
        const nearRoles = rankedRoles.filter((role) => topRoleScore - (normalizedRoles[role] || 0) <= P5_ROLE_MARGIN + 1e-12);
        const decisive = !secondRole || roleMargin >= P5_ROLE_MARGIN;
        let selectedType = topType;
        let lotteryCandidates = [];
        let lotteryWeights = null;
        if (!decisive) {
          const nearRoleTypes = rankedTypes.filter((type) => nearRoles.includes(typeHomeRole(type)));
          lotteryCandidates = nearRoleTypes.length ? nearRoleTypes : rankedTypes.slice(0, Math.min(2, rankedTypes.length));
          selectedType = weightedHashTypeChoice(lotteryCandidates, poolPrimaryShare, seed, purpose, P5_SUB_LOTTERY_BETA);
          lotteryWeights = Object.fromEntries(lotteryCandidates.map((type) => [type, 1]));
        }
        const roleDecision = {
          zone: decisive ? "decisive" : "lottery",
          path: decisive ? "role-margin" : "sub-role-near-tie-uniform-lottery",
          topRole,
          secondRole,
          topRoleScore: round(topRoleScore),
          secondRoleScore: round(secondRoleScore),
          roleMargin,
          nearRoles,
          signalRoles: [],
          normalizedRoles,
          roleMarginThreshold: P5_ROLE_MARGIN,
          pivotElement,
          decisionMode: P5_SUB_DECISION_MODE
        };
        return {
          selectedType,
          zone: roleDecision.zone,
          path: roleDecision.path,
          topType,
          topScore: round(topScore),
          secondType,
          secondScore: round(secondScore),
          typeMargin,
          rankedTypes,
          lotteryCandidates,
          lotteryWeights,
          normalizedScores: normalized,
          roleDecision,
          beta: P5_SUB_LOTTERY_BETA,
          roleMarginThreshold: P5_ROLE_MARGIN,
          decisionMode: P5_SUB_DECISION_MODE,
          roleWeights: {
            home: P5_ROLE_WEIGHT_HOME,
            adjacent: P5_ROLE_WEIGHT_ADJACENT,
            other: P5_ROLE_WEIGHT_OTHER
          }
        };
      }

      function normalizeHiddenSourceWeights(weights) {
        return Object.fromEntries(ELEMENTS.map((element) => [
          element,
          round((weights[element] || 0) * (HIDDEN_STEM_SUPPLY_NORMALIZATION[element] ?? 1))
        ]));
      }

      function chooseMainType(dmWx, useful, shares, structure, strength, seed, parsedPillars = null, poolPrimaryShare = null) {
        const domain = DOMAIN_MAP[dmWx];
        const elementWeights = parsedPillars ? mainElementWeights(parsedPillars) : Object.fromEntries(ELEMENTS.map((element) => [element, shares[element] || 0]));
        const rawScores = Object.fromEntries(domain.map((type) => [type, 0]));
        ELEMENTS.forEach((sourceElement) => {
          addProjectionScores(rawScores, dmWx, sourceElement, elementWeights[sourceElement] || 0);
        });
        const roleScores = roleInfluenceScores(dmWx, elementWeights);
        const decision = chooseTypeByRoleZone(rawScores, domain, roleScores, seed, "main-type-v5aprime", parsedPillars, poolPrimaryShare, dmWx, dmWx);
        const mainType = decision.selectedType;
        return {
          mainType,
          scores: normalizeTypeScores(rawScores),
          rawScores: Object.fromEntries(domain.map((type) => [type, round(rawScores[type] || 0)])),
          gate: [...domain],
          elementWeights,
          roleScores,
          decision,
          zone: decision.zone,
          projectionVersion: "ROLE_TYPE_PROJECTION_D031_P5APRIME_ROLE_MARGIN_" + P5_ROLE_MARGIN
        };
      }

      function chooseSubType(mainType, parsedPillars, seed, poolPrimaryShare = null) {
        const pivots = [parsedPillars[0].stem, parsedPillars[1].stem, parsedPillars[3].stem]
          .map((stem, index) => ({ stem, index, element: STEM_TO_WUXING[stem] }))
          .filter((pivot) => pivot.element);
        const sourceWeights = hiddenElementWeights(parsedPillars);
        const adjustedSourceWeights = normalizeHiddenSourceWeights(sourceWeights);
        const rawScores = emptyTypeScores();
        const aggregateRoleScores = { "比劫": 0, "食伤": 0, "财": 0, "官杀": 0, "印": 0 };
        const pivotScores = [];
        pivots.forEach((pivot) => {
          const factor = 1;
          const localScores = Object.fromEntries(DOMAIN_MAP[pivot.element].map((type) => [type, 0]));
          const localRoleScores = roleInfluenceScores(pivot.element, adjustedSourceWeights);
          Object.entries(localRoleScores).forEach(([role, value]) => {
            aggregateRoleScores[role] = round((aggregateRoleScores[role] || 0) + value);
          });
          ELEMENTS.forEach((sourceElement) => {
            const adjustedWeight = adjustedSourceWeights[sourceElement] || 0;
            addProjectionScores(localScores, pivot.element, sourceElement, adjustedWeight, factor);
            addProjectionScores(rawScores, pivot.element, sourceElement, adjustedWeight, factor);
          });
          pivotScores.push({
            stem: pivot.stem,
            pillarIndex: pivot.index,
            element: pivot.element,
            factor,
            rawScores: Object.fromEntries(Object.entries(localScores).map(([type, value]) => [type, round(value)])),
            scores: normalizeTypeScores(localScores),
            roleScores: localRoleScores
          });
        });
        const scoreOrder = Object.keys(rawScores).sort((left, right) => {
          const delta = (rawScores[right] || 0) - (rawScores[left] || 0);
          return delta || fnv1a(`${seed}|secondary-type-v5aprime|${left}`) - fnv1a(`${seed}|secondary-type-v5aprime|${right}`);
        }).filter((type) => (rawScores[type] || 0) > 0);
        const dominantPivot = stableSort(pivotScores, (pivot) => Object.values(pivot.rawScores).reduce((sum, value) => sum + value, 0), seed, "secondary-dominant-pivot-v5aprime")[0] || null;
        const decisionPivotElement = dominantPivot?.element || STEM_TO_WUXING[parsedPillars[1]?.stem] || "Earth";
        const decision = chooseTypeByRoleTwoZone(rawScores, scoreOrder, aggregateRoleScores, seed, "secondary-type-d0316-two-zone", parsedPillars, poolPrimaryShare, decisionPivotElement);
        const subType = decision.selectedType || scoreOrder[0] || null;
        const typeOrder = subType ? [subType, ...scoreOrder.filter((type) => type !== subType)] : scoreOrder;
        return {
          subType,
          scores: Object.fromEntries(Object.entries(rawScores).map(([type, value]) => [type, round(value)])),
          weights: normalizeTypeScores(rawScores),
          sample: null,
          typeOrder,
          scoreOrder,
          decision,
          zone: decision.zone,
          pivots: pivotScores,
          dominantPivot,
          roleScores: aggregateRoleScores,
          sourceWeights,
          adjustedSourceWeights,
          sourceElementFactor: HIDDEN_STEM_SUPPLY_NORMALIZATION,
          method: "tri_stem_hidden_source_projection_d0316_sub_two_zone"
        };
      }

      function orderedComboKey(types) {
        return [...new Set(types)].join("|");
      }

      function comboKey(types) {
        return [...new Set(types)].sort().join("|");
      }

      function normalizeTypeCombo(mainType, secondaryType) {
        return secondaryType && secondaryType !== mainType ? [mainType, secondaryType] : [mainType];
      }

      function buildTypeComboCandidates(mainType, secondaryTypeOrder, secondaryTypeScores = null) {
        const seen = new Set();
        const candidates = [];
        const orderedTypes = secondaryTypeOrder && secondaryTypeOrder.length ? [...secondaryTypeOrder] : [mainType];
        const firstType = orderedTypes[0] || mainType;
        const fallbackTypes = orderedTypes.slice(1).sort((left, right) => {
          const delta = (secondaryTypeScores?.[right] || 0) - (secondaryTypeScores?.[left] || 0);
          return delta || orderedTypes.indexOf(left) - orderedTypes.indexOf(right);
        });
        [firstType, ...fallbackTypes].forEach((secondaryType) => {
          const combo = normalizeTypeCombo(mainType, secondaryType);
          const key = orderedComboKey(combo);
          if (!seen.has(key)) {
            seen.add(key);
            candidates.push(combo);
          }
        });
        const singleKey = orderedComboKey([mainType]);
        if (!seen.has(singleKey)) candidates.push([mainType]);
        return candidates;
      }

      function createChainIndex(pokedex) {
        const entriesByName = new Map(pokedex.map((entry) => [entry.name, entry]));
        const groups = new Map();
        pokedex.forEach((entry) => {
          if (!groups.has(entry.chainId)) groups.set(entry.chainId, []);
          groups.get(entry.chainId).push(entry);
        });
        const chains = [...groups.entries()].map(([chainId, entries]) => {
          const finalNames = [...new Set(entries.flatMap((entry) => entry.finalForms))];
          const finals = finalNames.map((name) => entriesByName.get(name)).filter(Boolean);
          const combos = [...new Set(entries.flatMap((entry) =>
            (entry.finalTypeCombos || [entry.finalTypeCombo]).map(comboKey)
          ))];
          const orderedCombos = [...new Set(entries.flatMap((entry) =>
            (entry.finalTypeCombos || [entry.finalTypeCombo]).map(orderedComboKey)
          ))];
          return { chainId, entries, finals, combos, orderedCombos };
        });
        return { entriesByName, chains };
      }

      function narrativeStatPreference(structure, seed) {
        const tenGods = stableSort(Object.keys(TEN_GOD_TO_STAT), (key) => structure[key], seed, "narrative-stat-preference");
        return [...tenGods.map((key) => TEN_GOD_TO_STAT[key]), "hp"];
      }

      function balancedChainHash(seed, targetTypes, chainId) {
        return fnv1a(`${seed}|${orderedComboKey(targetTypes)}|${chainId}`);
      }

      function balancedFinalHash(seed, name) {
        return fnv1a(`${seed}|final|${name}`);
      }

      function chooseFinal(chain, targetTypes, dominantElement, seed, allowLegendaryFinal = true, useDominantElementFilter = false) {
        const finals = allowLegendaryFinal ? chain.finals : chain.finals.filter((entry) => !entry.isLegendary);
        const candidatePool = finals.length ? finals : chain.finals;
        const exact = candidatePool.filter((entry) => orderedComboKey(entry.types) === orderedComboKey(targetTypes));
        const mainMatches = candidatePool.filter((entry) => entry.types.includes(targetTypes[0]));
        let candidates = exact.length ? exact : mainMatches.length ? mainMatches : candidatePool;
        if (useDominantElementFilter) {
          const dominantTypes = DOMAIN_MAP[dominantElement];
          const dominantMatches = candidates.filter((entry) => entry.types.some((type) => dominantTypes.includes(type)));
          if (dominantMatches.length) candidates = dominantMatches;
        }
        return [...candidates].sort((left, right) => {
          const delta = balancedFinalHash(seed, left.name) - balancedFinalHash(seed, right.name);
          return delta || left.name.localeCompare(right.name);
        })[0];
      }

      function chooseChain(pokedex, typeComboCandidates, structure, shares, seed, allowLegendary) {
        const { entriesByName, chains } = createChainIndex(pokedex);
        const ordinaryEligible = chains.filter((chain) => chain.finals.some((entry) => !entry.isLegendary));
        const legendaryEligible = chains.filter((chain) => chain.finals.some((entry) => Boolean(entry.isLegendary)));
        const eligible = chains.filter((chain) => chain.finals.some((entry) => !entry.isLegendary || allowLegendary));
        let candidatesToTry = (Array.isArray(typeComboCandidates?.[0]) ? typeComboCandidates : [typeComboCandidates])
          .filter((combo) => Array.isArray(combo) && combo.length);
        candidatesToTry = applyForcedTypeComboOverride(seed, candidatesToTry);
        const primaryType = candidatesToTry[0]?.[0];
        const plannedComboKey = orderedComboKey(candidatesToTry[0] || []);
        let candidates = [];
        let selectedTargetTypes = candidatesToTry[0] || [];
        let fallback = "exact";
        let legendaryOnlyBypass = false;
        for (const candidateCombo of candidatesToTry) {
          const exactKey = orderedComboKey(candidateCombo);
          const exactCandidates = eligible.filter((chain) => chain.orderedCombos.includes(exactKey));
          if (exactCandidates.length) {
            candidates = exactCandidates;
            selectedTargetTypes = candidateCombo;
            fallback = exactKey === plannedComboKey ? "exact" : "ordered-secondary-rank";
            break;
          }
          const isPlannedCombo = exactKey === plannedComboKey;
          if (!allowLegendary && isPlannedCombo) {
            const legendaryExactCandidates = legendaryEligible.filter((chain) => chain.orderedCombos.includes(exactKey));
            if (legendaryExactCandidates.length) {
              candidates = legendaryExactCandidates;
              selectedTargetTypes = candidateCombo;
              fallback = "legendary-only-exact";
              legendaryOnlyBypass = true;
              break;
            }
          }
        }
        if (!candidates.length) {
          candidates = eligible.filter((chain) => chain.finals.some((entry) => entry.types[0] === primaryType));
          fallback = "main-primary";
        }
        if (!candidates.length) {
          candidates = eligible.filter((chain) => chain.finals.some((entry) => entry.types.includes(primaryType)));
          fallback = "main-type";
        }
        if (!candidates.length) {
          const relatedTypes = new Set(Object.entries(DOMAIN_MAP)
            .filter(([, types]) => types.includes(primaryType))
            .flatMap(([, types]) => types));
          candidates = eligible.filter((chain) => chain.finals.some((entry) => entry.types.some((type) => relatedTypes.has(type))));
          fallback = "near-domain";
        }
        if (!candidates.length) {
          candidates = eligible;
          fallback = "eligible-pool";
        }
        if (!candidates.length) throw friendlyError("No matching Pokemon could be found.");

        const preference = narrativeStatPreference(structure, seed);
        const dominantElement = stableSort(ELEMENTS, (element) => shares[element], seed, "dominant-element")[0];
        const allowLegendaryFinal = allowLegendary || legendaryOnlyBypass;
        const exactFallbacks = new Set(["exact", "ordered-secondary-rank", "legendary-only-exact", "legendary-only-ordered-secondary-rank"]);
        const useDominantElementFilter = !exactFallbacks.has(fallback);
        const ranked = candidates.map((chain) => {
          const final = chooseFinal(chain, selectedTargetTypes, dominantElement, seed, allowLegendaryFinal, useDominantElementFilter);
          return {
            chain,
            final,
            balancedHash: balancedChainHash(seed, selectedTargetTypes, chain.chainId),
            overridePriority: matchOverridePriority(seed, selectedTargetTypes, chain, final)
          };
        }).sort((left, right) => {
          const overrideDelta = left.overridePriority - right.overridePriority;
          if (overrideDelta) return overrideDelta;
          const hashDelta = left.balancedHash - right.balancedHash;
          return hashDelta || left.chain.chainId.localeCompare(right.chain.chainId);
        });
        return {
          ...ranked[0],
          fallback,
          legendaryOnlyBypass,
          candidateCount: candidates.length,
          entriesByName,
          preference,
          dominantElement,
          targetTypes: [...selectedTargetTypes],
          triedTypeCombos: candidatesToTry.map((combo) => [...combo]),
          selectionMethod: "balanced_hash_v1",
          useDominantElementFilter
        };
      }

      function buildSelectedPath(finalEntry, entriesByName) {
        const path = [];
        let current = finalEntry;
        const seen = new Set();
        while (current && !seen.has(current.name)) {
          seen.add(current.name);
          path.unshift(current);
          current = current.prevo ? entriesByName.get(current.prevo) : null;
        }
        return path;
      }

      function usefulPillarIndex(parsedPillars, useful, seed) {
        const scores = parsedPillars.map((pillar) => {
          let score = STEM_TO_WUXING[pillar.stem] === useful ? 1 : 0;
          (BRANCH_HIDDEN_STEMS[pillar.branch] || []).forEach((stem, index) => {
            if (STEM_TO_WUXING[stem] === useful) score += HIDDEN_WEIGHTS[index] || 0;
          });
          return score;
        });
        return stableSort([0, 1, 2, 3], (index) => scores[index], seed, "useful-pillar")[0];
      }

      function calculatePeakWindow(pillarIndex) {
        if (pillarIndex === 0) return { start: 25, end: 45, pattern: "early" };
        if (pillarIndex === 3) return { start: 40, end: 60, pattern: "late" };
        return { start: 30, end: 50, pattern: "steady" };
      }

      function calculateEnergy(age, peakWindow) {
        const { start, end } = peakWindow;
        if (age <= start - 16) return 0;
        if (age < start) return round((age - (start - 16)) / 16);
        if (age <= end) return 1;
        if (age < end + 20) return round(1 - (age - end) / 20);
        return 0;
      }

      function calculateMatchConfidence(pokedex, typeComboCandidates) {
        const candidates = (Array.isArray(typeComboCandidates?.[0]) ? typeComboCandidates : [typeComboCandidates])
          .filter((combo) => Array.isArray(combo) && combo.length);
        const exact = candidates.some((candidate) => {
          const target = orderedComboKey(candidate);
          return pokedex.some((entry) => (entry.finalTypeCombos || [entry.finalTypeCombo]).some((types) => orderedComboKey(types) === target));
        });
        if (exact) return 1;
        const primaryType = candidates[0]?.[0];
        const main = pokedex.some((entry) => entry.finalTypeCombo?.[0] === primaryType || entry.finalTypeCombo?.includes(primaryType));
        return main ? 0.65 : 0.35;
      }

      function calculateQuality(shares, structure, useful, parsedPillars, seasonCoefficient) {
        const values = Object.values(shares);
        const coverage = values.filter((value) => value > 0.03).length / ELEMENTS.length;
        const evenness = 1 - clamp(values.reduce((sum, value) => sum + Math.abs(value - 0.2), 0) / 1.6, 0, 1);
        const balanceScore = clamp(0.45 * coverage + 0.55 * evenness, 0, 1);
        const dominantStructure = Math.max(...Object.values(structure));
        const clarityScore = clamp((dominantStructure - 0.20) / 0.40, 0, 1);
        const usefulStrength = clamp((shares[useful] - 0.06) / 0.28, 0, 1);
        const seasonSupport = clamp((seasonCoefficient + 0.30) / 0.65, 0, 1);
        const branches = parsedPillars.map((pillar) => pillar.branch);
        let clashes = 0;
        for (let left = 0; left < branches.length; left += 1) {
          for (let right = left + 1; right < branches.length; right += 1) {
            if (CLASH_PAIRS.has(branches[left] + branches[right])) clashes += 1;
          }
        }
        const clashScore = clamp(1 - clashes / 3, 0, 1);
        const components = { balanceScore, clarityScore, usefulStrength, seasonSupport, clashScore };
        const weighted = (
          0.23 * balanceScore +
          0.27 * clarityScore +
          0.23 * usefulStrength +
          0.16 * seasonSupport +
          0.11 * clashScore
        );
        const quality = clamp((weighted - 0.28) / 0.52, 0, 1);
        return {
          quality: round(quality),
          components: Object.fromEntries(Object.entries(components).map(([key, value]) => [key, round(value)])),
          weighted: round(weighted),
          clashes,
          qualityFormulaVersion: "D-031-P2_NO_MATCH_CONFIDENCE"
        };
      }

      function publicSpecies(entry) {
        return {
          num: entry.num,
          name: entry.name,
          types: [...entry.types],
          baseStats: { ...entry.baseStats },
          chainId: entry.chainId,
          stageIndex: entry.stageIndex,
          chainStages: entry.chainStages,
          isLegendary: entry.isLegendary
        };
      }

      function rankedScoreEntries(scores, seed, purpose) {
        return stableSort(Object.keys(scores || {}), (key) => scores[key] || 0, seed, purpose)
          .map((key) => ({ key, score: round(scores[key] || 0) }));
      }

      function dominantStructureFeature(structure, seed) {
        const ordered = rankedScoreEntries(structure, seed, "dominant-structure-feature");
        const top = ordered[0] || { key: null, score: 0 };
        const runnerUp = ordered[1] || { key: null, score: 0 };
        const growthSignals = {
          "比劫": "grows through self-driven rhythm and peer resonance",
          "食伤": "grows by expression, output, and visible practice",
          "财": "grows by choosing concrete targets and exchanging with the world",
          "官杀": "grows through pressure, discipline, and clear boundaries",
          "印": "grows by receiving support, study, and accumulated shelter"
        };
        return {
          role: top.key,
          score: top.score,
          runnerUpRole: runnerUp.key,
          runnerUpScore: runnerUp.score,
          margin: round(top.score - runnerUp.score),
          growthSignal: growthSignals[top.key] || "grows by keeping several forces in balance"
        };
      }

      function strengthFeature(strengthResult) {
        const temperamentByStrength = {
          strong: "pressure moves outward before it settles",
          weak: "support and shelter help the rhythm take shape",
          balanced: "several forces stay close enough to negotiate"
        };
        return {
          label: strengthResult.strengthLabel,
          value: strengthResult.strength,
          season: strengthResult.season,
          seasonState: strengthResult.seasonState,
          seasonCoefficient: strengthResult.seasonCoefficient,
          temperamentSignal: temperamentByStrength[strengthResult.strengthLabel] || temperamentByStrength.balanced
        };
      }

      function mainTypeReasonFeature(mainResult, dmWx, seed) {
        const ranked = rankedScoreEntries(mainResult.scores, seed, "main-type-reason-feature");
        const top = ranked.find((entry) => entry.key === mainResult.mainType) || ranked[0] || { key: mainResult.mainType, score: 0 };
        const runnerUp = ranked.find((entry) => entry.key !== top.key) || { key: null, score: 0 };
        return {
          selectedType: mainResult.mainType,
          sourceElement: dmWx,
          homeRole: TYPE_AFFINITY[mainResult.mainType] || null,
          score: top.score,
          runnerUpType: runnerUp.key,
          runnerUpHomeRole: runnerUp.key ? TYPE_AFFINITY[runnerUp.key] || null : null,
          runnerUpScore: runnerUp.score,
          margin: round(top.score - runnerUp.score),
          projectionVersion: mainResult.projectionVersion
        };
      }

      function secondaryPivotFeature(subResult, selectedSubType) {
        const targetType = subResult.subType || selectedSubType || null;
        const pivots = Array.isArray(subResult.pivots) ? subResult.pivots : [];
        const rankedPivots = [...pivots].sort((left, right) => {
          const delta = (right.rawScores?.[targetType] || 0) - (left.rawScores?.[targetType] || 0);
          return delta || left.pillarIndex - right.pillarIndex;
        });
        const pivot = rankedPivots[0] || null;
        return {
          selectedType: targetType,
          matchedSubType: selectedSubType,
          homeRole: targetType ? TYPE_AFFINITY[targetType] || null : null,
          pivotStem: pivot?.stem || null,
          pillarIndex: Number.isInteger(pivot?.pillarIndex) ? pivot.pillarIndex : null,
          pivotElement: pivot?.element || null,
          pivotFactor: pivot?.factor ?? null,
          pivotScore: pivot ? round(pivot.rawScores?.[targetType] || 0) : 0,
          pivotChannelCount: pivots.length,
          method: subResult.method
        };
      }

      function explanationFeatures(selectedSpecies, typeCombo, stageIndex, chainStages, context = {}) {
        const stats = Object.entries(selectedSpecies.baseStats).sort((a, b) => b[1] - a[1]);
        const statPhrases = {
          hp: "keeps going through long stretches", atk: "acts with direct force",
          def: "holds steady under pressure", spa: "expresses power with precision",
          spd: "absorbs pressure without losing focus", spe: "moves before the moment passes"
        };
        const phase = chainStages === 1 ? "a complete form" : stageIndex === chainStages ? "a fully opened phase" : "a growing phase";
        const baseFeatures = {
          temperament: selectedSpecies.types.includes("Ghost") ? "quietly observant" : "steady and attentive",
          actionStyle: statPhrases[stats[0][0]],
          growthDirection: typeCombo.length > 1 ? "combines two different strengths" : "deepens one clear strength",
          pressurePattern: statPhrases[stats.find(([stat]) => stat === "def" || stat === "spd")?.[0] || stats[0][0]],
          currentPhase: phase,
          pokemonSimilarityHooks: [
            `${selectedSpecies.name} carries ${selectedSpecies.types.join(" and ")} traits`,
            statPhrases[stats[0][0]],
            phase
          ]
        };
        if (!context || !context.strengthResult || !context.structure || !context.mainResult || !context.subResult) {
          return baseFeatures;
        }
        return {
          ...baseFeatures,
          p1BridgeVersion: "D-031-P1",
          strengthSignal: strengthFeature(context.strengthResult),
          dominantStructure: dominantStructureFeature(context.structure, context.seed),
          mainTypeReason: mainTypeReasonFeature(context.mainResult, context.dmWx, context.seed),
          secondaryPivot: secondaryPivotFeature(context.subResult, context.selectedSubType),
          narrativeSourceFields: [
            "strengthLabel",
            "structure",
            "mainTypeScores",
            "subTypeSelection.pivots"
          ]
        };
      }

      async function calculatePokemonSoul(rawInput) {
        const input = validateInput(rawInput);
        const pokedex = await loadPokedex();
        const bazi = getBazi(input.normalizedToUtc8);
        const parsedPillars = bazi.map(parsePillar);
        const dmWx = STEM_TO_WUXING[parsedPillars[2].stem];
        if (!dmWx) throw friendlyError("The birth date could not be calculated.");
        const baziString = bazi.join("");
        const shares = calculateShares(parsedPillars);
        const structure = calculateStructure(parsedPillars, dmWx);
        const strengthResult = calculateStrength(shares, dmWx, parsedPillars[1].branch);
        const useful = chooseUseful(shares, dmWx, strengthResult.strengthLabel, baziString);
        const poolPrimaryShare = calculatePoolPrimaryShare(pokedex);
        const mainResult = chooseMainType(dmWx, useful, shares, structure, strengthResult.strength, baziString, parsedPillars, poolPrimaryShare);
        const subResult = chooseSubType(mainResult.mainType, parsedPillars, baziString, poolPrimaryShare);
        const rawTypeCombo = normalizeTypeCombo(mainResult.mainType, subResult.subType);
        const typeComboCandidates = buildTypeComboCandidates(mainResult.mainType, subResult.typeOrder, subResult.scores);
        const matchConfidence = calculateMatchConfidence(pokedex, typeComboCandidates);
        const qualityResult = calculateQuality(
          shares,
          structure,
          useful,
          parsedPillars,
          strengthResult.seasonCoefficient
        );
        const quality = qualityResult.quality;
        let allowLegendary = quality > LEGENDARY_QUALITY_THRESHOLD;
        let chainResult;
        try {
          chainResult = chooseChain(pokedex, typeComboCandidates, structure, shares, baziString, allowLegendary);
        } catch (error) {
          if (!allowLegendary) throw error;
          allowLegendary = false;
          chainResult = chooseChain(pokedex, typeComboCandidates, structure, shares, baziString, false);
          chainResult.legendaryFallback = true;
        }
        const typeCombo = chainResult.targetTypes && chainResult.targetTypes.length ? chainResult.targetTypes : rawTypeCombo;
        const selectedSubType = typeCombo.length > 1 ? typeCombo[1] : typeCombo[0];
        const selectedPath = buildSelectedPath(chainResult.final, chainResult.entriesByName);
        const chainStages = Math.max(1, selectedPath.length);
        const age = clamp(input.currentYear - input.original.year, 0, 130);
        const peakWindow = calculatePeakWindow(usefulPillarIndex(parsedPillars, useful, baziString));
        const energy = calculateEnergy(age, peakWindow);
        const stageIndex = chainStages === 1 ? 1 : clamp(Math.round(energy * (chainStages - 1)) + 1, 1, chainStages);
        const selectedSpecies = selectedPath[stageIndex - 1] || selectedPath[0] || chainResult.final;
        const features = explanationFeatures(selectedSpecies, typeCombo, stageIndex, chainStages, {
          strengthResult,
          structure,
          mainResult,
          subResult,
          selectedSubType,
          dmWx,
          seed: baziString
        });

        return {
          input,
          bazi,
          dmWx,
          shares,
          structure,
          strength: strengthResult.strength,
          strengthLabel: strengthResult.strengthLabel,
          useful,
          mainType: mainResult.mainType,
          subType: selectedSubType,
          typeCombo,
          selectedChainId: chainResult.chain.chainId,
          selectedSpecies: publicSpecies(selectedSpecies),
          chain: selectedPath.map(publicSpecies),
          stageIndex,
          chainStages,
          age,
          energy,
          peakWindow,
          quality,
          isLegendaryResult: (allowLegendary || Boolean(chainResult.legendaryOnlyBypass)) && Boolean(chainResult.final.isLegendary),
          explanationFeatures: features,
          debug: {
            algorithmVersion: ALGORITHM_VERSION,
            fallback: chainResult.fallback,
            legendaryFallback: Boolean(chainResult.legendaryFallback),

              if (result.quality > LEGENDARY_QUALITY_THRESHOLD) return { input, result };
            }
          }
        }
        return null;

      const STAT_STYLE_SENTENCES = {

      const HOTSPOT_ENDINGS = {

      };
      const FORBIDDEN_COPY_TERMS = [
        "八字", "四柱", "日主", "日干", "日支", "月令", "十神", "比劫", "劫财", "食神", "伤官",
        "正财", "偏财", "正官", "七杀", "官杀", "正印", "偏印", "用神", "喜神", "藏干", "透干",

        "哈希", "抽签", "算法", "权重", "fallback", "margin", "decisive", "lottery"
      ];
      const FORBIDDEN_COPY_PATTERNS = [
        { label: "与其说……不如说……", pattern: /与其说[^。！？]*不如说/ },
        { label: "这说明你……", pattern: /这说明你/ },
        { label: "总的来说……", pattern: /总的来说/ },
        { label: "综上……", pattern: /综上/ },
        { label: "你是一个……的人", pattern: /你是一个[^。！？]*的人/ },
        { label: "缘声部因果词", pattern: /\[缘声部\][^\n]*(因为|说明|所以|由于)/ }
      ];
      const PHASE_CHIPS = ["本相清晰", "缘分相认", "正在同行"];

      function validateVisibleCopy(text) {
        let visibleText = String(text ?? "");
        visibleText = visibleText.replaceAll("平衡不是平庸", "平衡不是常态词");
        const issues = [];
        FORBIDDEN_COPY_TERMS.forEach((term) => {
          if (visibleText.includes(term)) issues.push(`包含禁用词：${term}`);
        });

          if (pattern.test(visibleText)) issues.push(`包含禁用句式：${label}`);
        });
        return issues;
      }

      function typeName(type) {
        return TYPE_CN[type] || String(type || "未知");
      }

      function powerName(role) {
        return POWER_LABELS[role] || "几股力量";
      }

      function rankedScoreKeys(scores, seed, purpose) {
        const entries = Object.entries(scores || {});
        return entries.sort((left, right) => {
          const delta = Number(right[1] || 0) - Number(left[1] || 0);
          if (Math.abs(delta) > 1e-12) return delta;
          return String(left[0]).localeCompare(String(right[0]));
        }).map(([key, score]) => ({ key, score: Number(score || 0) }));
      }

      function strongestStat(species) {
        const stats = species?.baseStats && typeof species.baseStats === "object" ? Object.entries(species.baseStats) : [];
        stats.sort((left, right) => Number(right[1]) - Number(left[1]) || left[0].localeCompare(right[0]));
        return stats[0]?.[0] || "hp";
      }

      function typeComboPhrase(types) {
        const names = (types || []).map(typeName).filter(Boolean);
        if (!names.length) return "未知属性";
        return names.length === 1 ? `${names[0]}属性` : `${names.join("与")}属性`;
      }

      function mainRoleCandidates(result) {
        const decision = result?.debug?.mainTypeDecision;
        const roles = decision?.roleDecision?.nearRoles;
        if (Array.isArray(roles) && roles.length >= 2) return roles.slice(0, 2).map(powerName);
        const roleScores = decision?.roleDecision?.normalizedRoles || {};
        const ranked = rankedScoreKeys(roleScores).slice(0, 2).map((entry) => powerName(entry.key));
        if (ranked.length >= 2) return ranked;
        const home = result?.explanationFeatures?.mainTypeReason?.homeRole || result?.debug?.mainTypeDecision?.roleDecision?.topRole;
        const runner = result?.explanationFeatures?.mainTypeReason?.runnerUpHomeRole || result?.debug?.mainTypeDecision?.roleDecision?.secondRole;
        return [powerName(home), powerName(runner || home)].filter(Boolean).slice(0, 2);
      }

      function mainParagraph(result) {
        const features = result.explanationFeatures || {};
        const mainReason = features.mainTypeReason || {};
        const decision = result.debug?.mainTypeDecision || {};
        const zone = decision.zone === "lottery" ? "lottery" : "decisive";
        const role = mainReason.homeRole || decision.roleDecision?.topRole || null;
        const essence = TYPE_ESSENCE_SENTENCES[result.mainType] || TYPE_ESSENCE_SENTENCES.Normal;
        const strengthLabel = features.strengthSignal?.label || result.strengthLabel || "balanced";
        const strengthSentence = STRENGTH_SENTENCES[strengthLabel] || STRENGTH_SENTENCES.balanced;
        if (zone === "lottery") {
          const [left, right] = mainRoleCandidates(result);
          return `${left || "两股力量"}与${right || "另一股力量"}在你身上不分高下，两种形态都属于你。缘分让${typeName(result.mainType)}成为此刻的答案——另一面并未消失，它只是暂居幕后。${strengthSentence}`;
        }
        return `在你的结构里，${powerName(role)}明显压过了其余——${essence}${strengthSentence}`;
      }

      function secondaryParagraph(result) {
        const features = result.explanationFeatures || {};
        const pivot = features.secondaryPivot || {};
        const channel = CHANNEL_LABELS[pivot.pillarIndex] || CHANNEL_LABELS[1];
        const element = ELEMENT_CN[pivot.pivotElement] || "某种";
        const selected = result.subType || pivot.selectedType || (result.typeCombo || [])[1] || result.mainType;
        if (selected === result.mainType || (result.typeCombo || []).length === 1) {
          return "你的本相与另一面指向同一处——你是内外高度一致的人，这比双面更稀有。";
        }
        const zone = result.debug?.subTypeSelection?.decision?.zone || result.debug?.subTypeSelection?.zone || "lottery";
        if (zone === "decisive") {
          return `你的另一面经由${channel.name}显形：一股${element}之力清晰可辨，化作${typeName(selected)}的样子，在你的${channel.place}里生长。`;

      function phaseParagraph(result) {
        const speciesName = result?.selectedSpecies?.name || "这只宝可梦";
        const stageIndex = Number(result.stageIndex || 1);
        const chainStages = Number(result.chainStages || 1);
        const age = Number(result.age || 0);
